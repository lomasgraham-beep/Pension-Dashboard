<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Entry &amp; Recent Logs</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js?v=err7"></script>
<style>
  body { font-family:'Segoe UI',Tahoma,sans-serif; margin:0; padding:16px; background:#fff; color:#333; }
  h2 { color:#2c3e50; margin-top:0; border-bottom:2px solid #e2e8f0; padding-bottom:6px; }
  .form-group { margin-bottom:15px; }
  .form-group label { display:block; font-weight:bold; font-size:13px; color:#2c3e50; margin-bottom:5px; }
  .form-group input, .form-group select { padding:11px; border:1px solid #ccc; border-radius:6px; font-size:15px; box-sizing:border-box; max-width:360px; width:100%; }
  .btn { background:#3498db; color:#fff; border:none; padding:13px 22px; border-radius:8px; font-weight:bold; font-size:15px; cursor:pointer; }
  .btn-clear { background:#64748b; padding:9px 16px; font-size:14px; }
  .pot-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:14px; max-width:740px; margin-bottom:15px; }
  .pot-card { background:#f8fafc; padding:14px; border-radius:8px; border:1px solid #e2e8f0; }
  .pot-label { display:block; font-weight:bold; font-size:14px; color:#2c3e50; margin-bottom:6px; }
  .pot-input { width:100%; padding:11px; border:1px solid #ccc; border-radius:6px; font-size:16px; box-sizing:border-box; text-align:right; }
  .contrib-label { display:flex; align-items:flex-start; gap:8px; font-weight:normal; color:#64748b; cursor:pointer; margin-top:10px; font-size:13px; }
  .contrib-label input { width:auto; flex:0 0 auto; margin-top:2px; }
  .filter-bar { display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; background:#f8fafc; border:1px solid #cbd5e1; border-radius:8px; padding:12px 14px; margin:16px 0; }
  .filter-bar label { display:block; font-size:12px; color:#64748b; font-weight:bold; margin-bottom:4px; }
  .filter-bar select, .filter-bar input { padding:8px; border:1px solid #ccc; border-radius:6px; font-size:14px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  #hTable { width:auto; }
  #hTable th, #hTable td { padding-right:18px; white-space:nowrap; }
  th,td { padding:9px 10px; border-bottom:1px solid #e2e8f0; text-align:left; }
  th { background:#f8fafc; color:#2c3e50; }
  .contrib-badge { display:inline-block; background:#dbeafe; color:#1e40af; font-size:11px; font-weight:bold; padding:2px 7px; border-radius:10px; margin-left:6px; }
  .msg { font-weight:bold; margin-top:12px; }
  #status { padding:8px 12px; border-radius:6px; font-weight:bold; margin-bottom:12px; font-size:14px; }
  .s-load { background:#eff6ff; color:#1e3a8a; } .s-err { background:#fdecea; color:#c0392b; } .s-ok { background:#d1fae5; color:#065f46; }

  /* ---- Phone compacting ---- */
  @media (max-width: 600px) {
    body { padding:12px; }
    h2 { font-size:19px; }
    .form-group { margin-bottom:10px; }
    .form-group label { font-size:12px; margin-bottom:3px; }
    .form-group input, .form-group select { padding:9px; font-size:15px; max-width:none; }
    .pot-grid { grid-template-columns:1fr 1fr; gap:10px; }
    .pot-card { padding:10px; }
    .pot-label { font-size:13px; }
    .contrib-label { font-size:12px; }
    .filter-bar { gap:8px 10px; padding:10px; }
    .filter-bar > div { flex:1 1 auto; }
    .filter-bar label { font-size:11px; }
    #hTable th, #hTable td { padding:7px 10px 7px 0; font-size:13px; }
  }
</style>
</head>
<body>
  <div id="status" class="s-load">Loading…</div>

  <h2>Log New Balances <span style="font-size:11px; font-weight:normal; color:#94a3b8;">(logs build: phone-1)</span></h2>
  <div class="form-group"><label>Whose accounts are you updating?</label><select id="logMember" onchange="renderInputs()"><option>Graham</option><option>Julie</option></select></div>
  <div class="form-group"><label>Date</label><input type="date" id="entryDate"></div>
  <div id="inputs"></div>
  <button class="btn" onclick="submitEntry()">Submit to Cloud Database</button>
  <div class="msg" id="entryMsg"></div>

  <h2 style="margin-top:35px;">Recent Logs</h2>
  <div class="filter-bar">
    <div><label>Member</label><select id="hMember" onchange="renderHistory()"><option value="All">All</option><option>Graham</option><option>Julie</option></select></div>
    <div><label>Pension</label><select id="hPension" onchange="renderHistory()"><option value="All">All</option></select></div>
    <div><label>Specific Date</label><input type="date" id="hDate" onchange="renderHistory()"></div>
    <button class="btn btn-clear" onclick="clearFilters()">Clear Filters</button>
  </div>
  <table id="hTable"><thead><tr><th>Date</th><th>Member</th><th>Pension Name</th><th>Logged Value</th></tr></thead><tbody><tr><td colspan="4">Loading…</td></tr></tbody></table>

<script>
  const fmt = App.fmt;
  let userPensions = [], allLogs = [], allContributions = [], grahamParams = null;

  function getExpectedContribution(log) {
    if (log.member_name === 'Graham' && log.pension_name === 'Pru') {
      const d = new Date(log.log_date), yr = d.getFullYear(), mo = d.getMonth() + 1;
      if ((yr === 2025 && mo >= 10) || (yr === 2026 && mo <= 3)) return 2313;
    }
    let days = 5;
    if (log.member_name === 'Graham' && grahamParams) {
      const ld = new Date(log.log_date);
      const d1 = grahamParams.shorter_week_date_1 ? new Date(grahamParams.shorter_week_date_1) : null;
      const d2 = grahamParams.shorter_week_date_2 ? new Date(grahamParams.shorter_week_date_2) : null;
      if (d2 && ld >= d2) days = grahamParams.working_days_2 || 5;
      else if (d1 && ld >= d1) days = grahamParams.working_days_1 || 5;
    }
    const m = allContributions.find(c => c.member_name === log.member_name && c.pension_name === log.pension_name && (log.member_name !== 'Graham' || Number(c.working_days) === Number(days)));
    return m ? (Number(m.monthly_contribution) || 0) : 0;
  }

  function renderInputs() {
    const member = document.getElementById('logMember').value, box = document.getElementById('inputs');
    const pots = userPensions.filter(p => p.member_name === member && p.pension_type === 'Defined Contributions');
    if (!pots.length) { box.innerHTML = '<p>No DC pots found for ' + member + '.</p>'; return; }
    box.innerHTML = '<div class="pot-grid">' + pots.map(p => `
      <div class="pot-card">
        <label class="pot-label">${p.pension_name} Value (£)</label>
        <input type="number" class="pot-input" data-pension="${p.pension_name}" step="1" value="0">
        <label class="contrib-label">
          <input type="checkbox" class="contrib-input" data-pension="${p.pension_name}">Includes standard monthly contribution?</label>
      </div>`).join('') + '</div>';
  }

  async function submitEntry() {
    const msg = document.getElementById('entryMsg'); msg.style.color = '#1e3a8a'; msg.textContent = 'Saving…';
    const date = document.getElementById('entryDate').value;
    if (!date) { msg.style.color = '#c0392b'; msg.textContent = 'Pick a date first.'; return; }
    const payloads = [];
    document.querySelectorAll('.pot-input').forEach(inp => {
      const pName = inp.dataset.pension;
      const cb = document.querySelector(`.contrib-input[data-pension="${pName}"]`);
      payloads.push({ member_name: document.getElementById('logMember').value, pension_name: pName, pot_value: parseFloat(inp.value) || 0, log_date: date, contribution_applied: cb ? cb.checked : false });
    });
    try {
      await App.write('POST', 'op_pension_logs', payloads);
      msg.style.color = '#065f46'; msg.textContent = '✓ Saved ' + payloads.length + ' balance(s).';
      allLogs = await App.rest('op_pension_logs?order=log_date.desc'); renderHistory();
    } catch (e) { msg.style.color = '#c0392b'; msg.textContent = 'Save failed: ' + e.message; }
  }

  function renderHistory() {
    const tbody = document.querySelector('#hTable tbody');
    const mf = document.getElementById('hMember').value, pf = document.getElementById('hPension').value, df = document.getElementById('hDate').value;
    let data = allLogs.filter(l => (mf === 'All' || l.member_name === mf) && (pf === 'All' || l.pension_name === pf) && (!df || l.log_date === df));
    data = data.slice().sort((a, b) => new Date(b.log_date) - new Date(a.log_date));
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="4">No logs match.</td></tr>'; return; }
    tbody.innerHTML = data.map(l => {
      const d = new Date(l.log_date), uk = ('0' + d.getDate()).slice(-2) + '/' + ('0' + (d.getMonth() + 1)).slice(-2) + '/' + d.getFullYear();
      let badge = '';
      if (l.contribution_applied) { const c = getExpectedContribution(l); badge = c > 0 ? `<span class="contrib-badge">+${fmt(c)} contrib</span>` : '<span class="contrib-badge">+ contrib</span>'; }
      return `<tr><td>${uk}</td><td>${l.member_name}</td><td>${l.pension_name}</td><td style="font-weight:bold;">${fmt(l.pot_value)} ${badge}</td></tr>`;
    }).join('');
  }

  function clearFilters() { document.getElementById('hMember').value = 'All'; document.getElementById('hPension').value = 'All'; document.getElementById('hDate').value = ''; renderHistory(); }

  async function load() {
    const status = document.getElementById('status');
    document.getElementById('entryDate').valueAsDate = new Date();
    try {
      const [pensions, logs, contribs, pRows] = await Promise.all([
        App.rest('bd_pensions'), App.rest('op_pension_logs?order=log_date.desc'),
        App.rest('bd_pension_contributions'), App.rest('op_modelling_parameters?member_name=eq.Graham&limit=1')
      ]);
      userPensions = pensions; allLogs = logs; allContributions = contribs; grahamParams = pRows && pRows[0] ? pRows[0] : null;
      const sel = document.getElementById('hPension');
      const names = [...new Set(allLogs.map(l => l.pension_name))].sort();
      sel.innerHTML = '<option value="All">All</option>' + names.map(n => `<option>${n}</option>`).join('');
      renderInputs(); renderHistory(); status.style.display = 'none';
    } catch (e) { status.className = 's-err'; status.textContent = 'Could not load: ' + e.message; }
  }
  App.requireLogin(load, { title: 'Log Entry' });
</script>
</body>
</html>
