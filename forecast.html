<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Forecast</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js?v=err45"></script>
<script src="engine.js?v=fcast"></script>
<style>
  body { font-family:'Segoe UI',Tahoma,sans-serif; margin:0; padding:16px; background:#fff; color:#333; }
  h2 { color:#2c3e50; margin-top:0; }
  .note { color:#64748b; font-size:13px; margin-top:-4px; margin-bottom:14px; }
  table { width:auto; border-collapse:collapse; font-size:14px; }
  th,td { padding:9px 16px 9px 10px; border-bottom:1px solid #e2e8f0; text-align:right; }
  th { white-space:normal; text-align:center; vertical-align:bottom; line-height:1.2; max-width:90px; }
  td { white-space:nowrap; }
  th:first-child,td:first-child { text-align:left; padding-right:24px; }
  td:first-child { color:#475569; }
  th { background:#f8fafc; color:#2c3e50; position:sticky; top:0; }
  #status { padding:8px 12px; border-radius:6px; font-weight:bold; margin-bottom:12px; font-size:14px; }
  .s-load { background:#eff6ff; color:#1e3a8a; } .s-err { background:#fdecea; color:#c0392b; }

  @media (max-width: 600px) {
    body { padding:12px; }
    table { font-size:12px; }
    th, td { padding:6px 8px 6px 0; }
    th { max-width:64px; font-size:11px; }
    th:first-child, td:first-child { padding-right:12px; }
  }
</style>
</head>
<body>
  <div id="status" class="s-load">Loading…</div>
  <h2>Pre-Retirement Monthly Forecast</h2>
  <p class="note">Projected pot growth to each person's retirement date, computed in your browser from your tiers and contributions. <span style="color:#94a3b8;">(forecast build: engine)</span></p>
  <table id="fTable">
    <thead><tr><th>Month</th><th><span class="nm-p1">Graham</span>'s Tracked Total</th><th class="col-p2"><span class="nm-p2">Julie</span>'s Tracked Total</th><th>Joint Trajectory</th></tr></thead>
    <tbody><tr><td colspan="4">Computing…</td></tr></tbody>
  </table>

<script>
  const fmt = App.fmt;
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  async function load() {
    const status = document.getElementById('status');
    try {
      const mn = await App.memberNames();
      const p1Name = mn.p1 || 'Graham', p2Name = mn.p2 || null;
      document.querySelectorAll('.nm-p1').forEach(el => el.textContent = p1Name);
      document.querySelectorAll('.nm-p2').forEach(el => el.textContent = p2Name || '');
      // hide person-2 column when single member
      if (!p2Name) document.querySelectorAll('.col-p2').forEach(el => el.style.display = 'none');

      // Pull the same data the dashboard engine uses.
      const [members, pensions, contributions, logs, contributionExceptions, workingTiers, p1ParamsArr, p2ParamsArr] = await Promise.all([
        App.rest('bd_members'),
        App.rest('bd_pensions'),
        App.rest('bd_pension_contributions'),
        App.rest('op_pension_logs?order=log_date.desc'),
        App.rest('bd_contribution_exceptions?order=start_date.asc'),
        App.rest('bd_working_tiers?order=from_date.asc'),
        App.rest('op_modelling_parameters?member_name=eq.' + encodeURIComponent(p1Name) + '&order=updated_at.desc&limit=1'),
        p2Name ? App.rest('op_modelling_parameters?member_name=eq.' + encodeURIComponent(p2Name) + '&order=updated_at.desc&limit=1') : Promise.resolve([])
      ]);

      const data = { members, pensions, contributions, logs,
                     contributionExceptions: contributionExceptions || [],
                     workingTiers: workingTiers || [], crashes: [], savingsAccounts: [] };

      const p = (p1ParamsArr && p1ParamsArr.length) ? p1ParamsArr[0] : {};
      const p2 = (p2ParamsArr && p2ParamsArr.length) ? p2ParamsArr[0] : null;
      const p1Retire = App.parseLocalDate(p.retirement_date);
      const p2Retire = (p2 && p2.retirement_date) ? App.parseLocalDate(p2.retirement_date) : p1Retire;
      const retireByMember = {};
      if (p1Name && p1Retire) retireByMember[p1Name] = p1Retire;
      if (p2Name && p2Retire) retireByMember[p2Name] = p2Retire;

      const plan = {
        retirementDate: [p1Retire, p2Retire].filter(Boolean).sort((a, b) => b - a)[0] || p1Retire,
        retireByMember: retireByMember,
        growthRate: p.pension_growth_rate != null ? Number(p.pension_growth_rate) : 0.05
      };

      const res = PensionEngine.forecast(data, plan, 1);
      const series = res.series || [];
      const tb = document.querySelector('#fTable tbody');
      tb.innerHTML = series.length ? series.map(r => {
        const label = MONTHS[r.month] + ' ' + r.year;
        const p2cell = p2Name ? `<td>${fmt(r.j)}</td>` : '';
        return `<tr><td>${label}</td><td>${fmt(r.g)}</td>${p2cell}<td style="font-weight:bold;">${fmt(r.g + (p2Name ? r.j : 0))}</td></tr>`;
      }).join('') : '<tr><td colspan="4">No forecast rows — check your tiers and contributions are set.</td></tr>';
      status.style.display = 'none';
    } catch (e) { status.className = 's-err'; status.textContent = 'Could not load: ' + e.message; }
  }
  App.requireLogin(load, { title: 'Monthly Forecast' });
</script>
</body>
</html>
