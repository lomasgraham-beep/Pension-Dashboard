<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Budget</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js?v=err71"></script>
<style>
  body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; margin:0 auto; max-width:1100px; padding:20px; background:#f4f7f6; color:#333; font-size:16px; }
  h1 { color:#2c3e50; margin-bottom:2px; }
  .note { color:#64748b; font-size:14px; margin-top:0; margin-bottom:18px; }
  #status { padding:10px 14px; border-radius:6px; font-weight:bold; margin-bottom:14px; font-size:15px; background:#eff6ff; color:#1e3a8a; }
  .s-err { background:#fdecea !important; color:#c0392b !important; }
  .cols { display:grid; grid-template-columns:repeat(4, 1fr); gap:18px; align-items:start; }
  .person { border:2px solid #2c3e50; border-radius:10px; background:#fff; height:820px; display:flex; flex-direction:column; overflow:hidden; }
  .person .card-head { flex:0 0 auto; }
  .person .card-scroll { flex:1 1 auto; overflow-y:auto; min-height:0; }
  .person .card-foot { flex:0 0 auto; border-top:2px solid #cbd5e1; }
  .col3 { display:flex; flex-direction:column; gap:18px; height:820px; }
  .tier-sel { display:flex; gap:6px; padding:8px 12px; flex-wrap:wrap; }
  .tier-btn { border:1px solid #cbd5e1; background:#fff; color:#475569; border-radius:6px; padding:6px 12px; font-size:13px; font-weight:bold; cursor:pointer; min-height:34px; }
  .tier-btn.on { background:#2c3e50; color:#fff; border-color:#2c3e50; }
  td.amt.neg { color:#c0392b; }
  .muted { color:#64748b; font-size:13px; }
  .col3 .person { height:auto; flex:1 1 0; min-height:0; }
  /* col3 blocks (Credit Card, PayPal, Cash Summary) have no scroll wrapper; let their last table scroll */
  .col3 .person > table { flex:1 1 auto; display:block; overflow-y:auto; min-height:0; width:100%; }
  .col3 .person > table tbody { display:table; width:100%; }
  .col3 .person > .blocktitle, .col3 .person > .subtitle { flex:0 0 auto; }
  @media (max-width: 1100px) and (min-width: 761px) { .cols { grid-template-columns:repeat(2, 1fr); } }
  @media (max-width: 760px) { .cols { grid-template-columns:1fr; } .person, .col3 .person { height:auto; max-height:600px; } .col3 { height:auto; } }
  .blocktitle { background:#2c3e50; color:#fff; font-weight:bold; text-align:center; padding:9px; font-size:16px; }
  .subtitle { background:#eef2f7; color:#2c3e50; font-weight:bold; text-align:center; padding:7px; font-size:14px; border-top:1px solid #e2e8f0; border-bottom:1px solid #e2e8f0; }
  table { border-collapse:collapse; width:100%; }
  td { padding:7px 12px; border-bottom:1px solid #eef2f7; font-size:15px; }
  td.amt { text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
  tr.total td { font-weight:bold; border-top:2px solid #cbd5e1; background:#f8fafc; }
  tr.avail td { font-weight:bold; background:#f59e0b; color:#1a1a1a; font-size:16px; }
  tr.acct-head td { font-weight:bold; color:#64748b; font-size:13px; background:#fbfcfe; }
  .panel { background:#fff; border:1px solid #e2e8f0; border-radius:8px; padding:0; margin-top:18px; overflow:hidden; }

  @media (prefers-color-scheme: dark) {
    html, body { background:#0f172a !important; color:#cbd5e1 !important; }
    h1 { color:#f1f5f9 !important; } .note { color:#94a3b8 !important; }
    .person, .panel { background:#1e293b !important; border-color:#334155 !important; }
    .person .card-foot { border-color:#475569 !important; }
    .tier-btn { background:#0f172a !important; color:#cbd5e1 !important; border-color:#475569 !important; }
    .tier-btn.on { background:#3b82f6 !important; color:#fff !important; border-color:#3b82f6 !important; }
    td.amt.neg { color:#f87171 !important; }
    .blocktitle { background:#15803d !important; color:#ffffff !important; }
    .subtitle { background:#162132 !important; color:#cbd5e1 !important; border-color:#334155 !important; }
    td { border-color:#334155 !important; color:#cbd5e1 !important; }
    tr.total td { background:#162132 !important; color:#f1f5f9 !important; border-color:#475569 !important; }
    tr.acct-head td { background:#131c2b !important; color:#94a3b8 !important; }
    tr.avail td { background:#b45309 !important; color:#fff !important; }
    #status { background:#1e293b !important; color:#93c5fd !important; }
  }
</style>
</head>
<body>
  <h1>Monthly Budget</h1>
  <p class="note">Today's budget per person: net income in, bills out (grouped by account), and what's left each month. Income is the current working-tier salary from Workplace Income. <span style="color:#94a3b8;">(budget build: v16)</span></p>
  <div id="status">Loading…</div>
  <div class="cols" id="cols" style="display:none;">
    <div id="colGraham"></div>
    <div id="colJulie"></div>
    <div id="col3" class="col3"></div>
    <div id="col4" class="col3"></div>
  </div>

<script>
  const fmt = App.fmt;

  function annualToMonthly(premium, frequency) {
    const p = Number(premium) || 0;
    if (frequency === 'Weekly') return p * 52 / 12;
    if (frequency === 'Annual') return p / 12;
    return p;   // Monthly (or default)
  }

  // current active working-days tier for a member (latest from_date <= today)
  function currentTierDays(member, tiers) {
    const now = new Date(); let best = null;
    (tiers || []).forEach(t => {
      if (t.member_name !== member || !t.from_date) return;
      const from = new Date(t.from_date);
      if (from <= now && (!best || from > new Date(best.from_date))) best = t;
    });
    return best ? Number(best.days) : null;
  }

  // distinct day-counts this member actually has, sorted high→low (e.g. [5,3])
  function tiersFor(member, tiers) {
    const set = {};
    (tiers || []).forEach(t => { if (t.member_name === member && t.days != null) set[Number(t.days)] = true; });
    return Object.keys(set).map(Number).sort((a, b) => b - a);
  }

  // loaded data + per-person what-if tier selection (resets on reload)
  let DATA = null;
  const selectedTier = {};   // member -> chosen day-count

  async function load() {
    const status = document.getElementById('status');
    try {
      const [members, bills, tiers, incAmts, otherInc, pensContribs, billCats, diningRota, mealCost, bankAccts] = await Promise.all([
        App.rest('bd_members?order=name.asc'),
        App.rest('bd_household_bills?order=paid_account.asc,bill_name.asc'),
        App.rest('bd_working_tiers?order=from_date.asc'),
        App.rest('bd_income_amounts?order=member_name.asc'),
        App.rest('bd_other_income?order=member_name.asc'),
        App.rest('bd_pension_contributions?order=member_name.asc'),
        App.rest('bd_bill_category?order=code.asc'),
        App.rest('bd_dining_rota'),
        App.rest('bd_meal_cost'),
        App.rest('bd_bank_account?order=account_id.asc')
      ]);
      const names = (members || []).map(m => m.name).filter(Boolean);
      if (!names.length) { status.textContent = 'No members found.'; return; }
      // new dining annual total = Σ (each filled rota cell × its meal-cost lookup)
      const mealCostMap = {};
      (mealCost || []).forEach(c => { mealCostMap[c.meal_type + '|' + c.level] = Number(c.cost) || 0; });
      const DAY_COLS = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
      const diningAnnual = (diningRota || []).reduce((sum, r) => sum + DAY_COLS.reduce((s, col) => s + (r[col] ? (mealCostMap[r.meal_type + '|' + r[col]] || 0) : 0), 0), 0);
      DATA = { names, bills: bills || [], tiers: tiers || [], incAmts: incAmts || [], otherInc: otherInc || [], pensContribs: pensContribs || [], billCats: billCats || [], diningAnnual: diningAnnual, bankAccts: bankAccts || [] };
      // default each person's selector to their current active tier
      names.forEach(n => { selectedTier[n] = currentTierDays(n, DATA.tiers); });
      status.style.display = 'none';
      rebuild();
    } catch (e) { status.className = 's-err'; status.textContent = 'Could not load: ' + e.message; }
  }

  // called by each tier selector button
  function setTier(member, days) {
    selectedTier[member] = (days === '' || days == null) ? null : Number(days);
    rebuild();
  }

  function rebuild() {
    const d = DATA; if (!d) return;
    const avails = {};
    const blocks = d.names.map(name => {
      const r = personBlock(name, d.bills, d.tiers, d.incAmts, d.otherInc, d.pensContribs, d.bankAccts);
      avails[name] = r.avail;
      return r.html;
    });
    document.getElementById('colGraham').innerHTML = blocks[0] || '';
    document.getElementById('colJulie').innerHTML = blocks[1] || '';
    if (blocks.length > 2) document.getElementById('colGraham').innerHTML += blocks.slice(2).join('');

    const diningMonthly = (Number(d.diningAnnual) || 0) / 12;
    const cc = payerCatBlock(d.bills, d.billCats, 'Credit card', 'Credit Card', diningMonthly);
    const pp = payerCatBlock(d.bills, d.billCats, 'PayPal', 'PayPal', 0);
    const footerHtml = buildFooter(d.names, d.tiers, d.pensContribs, avails, cc.total, pp.total);
    document.getElementById('col3').innerHTML = cc.html;
    document.getElementById('col4').innerHTML = pp.html + footerHtml;
    document.getElementById('cols').style.display = 'grid';
  }

  // segmented tier selector for a person (only their actual tiers); '' was current
  function tierSelectorHtml(name, tiers) {
    const opts = tiersFor(name, tiers);
    if (opts.length < 2) return '';   // nothing to switch if only one tier
    const sel = selectedTier[name];
    const btns = opts.map(d =>
      '<button type="button" class="tier-btn' + (Number(sel) === d ? ' on' : '') + '" onclick="setTier(\'' + name.replace(/'/g, "\\'") + '\',' + d + ')">' + d + '-day</button>'
    ).join('');
    return '<div class="tier-sel">' + btns + '</div>';
  }

  function personBlock(name, bills, tiers, incAmts, otherInc, pensContribs, bankAccts) {
    // --- IN: salary from Workplace Income at the selected tier + any other income ---
    const days = (selectedTier[name] !== undefined) ? selectedTier[name] : currentTierDays(name, tiers);
    let inRows = '', totalIn = 0;
    const salaryRows = incAmts.filter(a => a.member_name === name && (days == null || Number(a.working_days) === Number(days)));
    // if no tier match, fall back to any income rows for this member
    const useRows = salaryRows.length ? salaryRows : incAmts.filter(a => a.member_name === name);
    useRows.forEach(a => {
      const v = Number(a.net_monthly) || 0; totalIn += v;
      inRows += '<tr><td>' + (a.source_name || 'Salary') + '</td><td class="amt">' + fmt(v) + '</td></tr>';
    });
    (otherInc || []).filter(o => o.member_name === name).forEach(o => {
      const v = Number(o.net_monthly) || 0; totalIn += v;
      inRows += '<tr><td>' + (o.source_name || 'Other') + '</td><td class="amt">' + fmt(v) + '</td></tr>';
    });
    if (!inRows) inRows = '<tr><td colspan="2" style="color:#94a3b8;">No income set</td></tr>';

    // accounts this person holds (by account_id), from the Bank Accounts table
    const myAccounts = {};
    (bankAccts || []).forEach(a => { if (a.account_holder === name && a.account_id) myAccounts[a.account_id] = true; });

    // --- OUT: this person's bills + pension contributions, grouped by account ---
    // bucket: account_id -> array of {label, amt}
    const byAcct = {};
    const add = (acct, label, amt) => { const k = acct || '\u2014'; (byAcct[k] = byAcct[k] || []).push({ label: label, amt: amt }); };
    bills.filter(b => b.paid_by === name).forEach(b => {
      add(b.paid_account, b.bill_name || '', annualToMonthly(b.premium, b.frequency));
    });
    // pension contributions whose paying account is held by this person.
    // NOTE: the contribution may belong to a DIFFERENT member (e.g. Julie's pension paid from your account),
    // so the tier check must use the contribution OWNER's tier, not this card-holder's.
    (pensContribs || []).forEach(p => {
      if (!p.paid_account || !myAccounts[p.paid_account]) return;
      const owner = p.member_name;
      const ownerDays = (selectedTier[owner] !== undefined) ? selectedTier[owner] : currentTierDays(owner, tiers);
      if (p.working_days != null && ownerDays != null && Number(p.working_days) !== Number(ownerDays)) return;
      const isWorkplace = /aegon/i.test(p.pension_name || '');
      const gross = Number(p.monthly_contribution) || 0;
      const cost = isWorkplace ? gross : gross / 1.25;
      if (cost === 0) return;
      // label shows whose pension it is when it's not the account holder's own
      const whose = (owner && owner !== name) ? owner + ' ' : '';
      add(p.paid_account, whose + (p.pension_name || 'Pension') + ' (pension)', cost);
    });

    let outRows = '', totalOut = 0;
    const acctKeys = Object.keys(byAcct).sort();
    acctKeys.forEach(acct => {
      let acctTotal = 0;
      const rowsHtml = byAcct[acct].sort((a, b) => a.label.localeCompare(b.label)).map(item => {
        acctTotal += item.amt; totalOut += item.amt;
        return '<tr><td>' + item.label + '</td><td class="amt">' + fmt(item.amt) + '</td></tr>';
      }).join('');
      const head = (acctKeys.length > 1 || acct !== '\u2014')
        ? '<tr class="acct-head"><td>' + (acct === '\u2014' ? 'Other' : acct) + '</td><td class="amt">' + fmt(acctTotal) + '</td></tr>'
        : '';
      outRows += head + rowsHtml;
    });
    if (!outRows) outRows = '<tr><td colspan="2" style="color:#94a3b8;">Nothing assigned to ' + name + '</td></tr>';

    const avail = totalIn - totalOut;
    const html = '<div class="person">' +
      '<div class="card-head">' +
        '<div class="blocktitle">' + name + '</div>' +
        tierSelectorHtml(name, tiers) +
        '<div class="subtitle">In</div><table><tbody>' + inRows +
          '<tr class="total"><td>Total In</td><td class="amt">' + fmt(totalIn) + '</td></tr></tbody></table>' +
        '<div class="subtitle">Out</div>' +
      '</div>' +
      '<div class="card-scroll"><table><tbody>' + outRows + '</tbody></table></div>' +
      '<div class="card-foot"><table><tbody>' +
        '<tr class="total"><td>Total Out</td><td class="amt">' + fmt(totalOut) + '</td></tr>' +
        '<tr class="avail"><td>' + name + ' available per month</td><td class="amt">' + fmt(avail) + '</td></tr></tbody></table>' +
      '</div>' +
      '</div>';
    return { html: html, avail: avail };
  }

  function payerCatBlock(bills, billCats, payer, title, diningMonthly) {
    const mine = bills.filter(b => b.paid_by === payer);
    const dining = Number(diningMonthly) || 0;
    if (!mine.length && dining === 0) return { html: '', total: 0 };
    const catLabel = {};
    (billCats || []).forEach(c => { catLabel[c.code] = c.description || c.code; });
    const byCat = {};
    let total = 0;
    mine.forEach(b => {
      const code = b.category_code || '\u2014';
      const m = annualToMonthly(b.premium, b.frequency);
      byCat[code] = (byCat[code] || 0) + m;
      total += m;
    });
    let rows = Object.keys(byCat).map(code => ({
      code: code,
      label: code === '\u2014' ? 'Uncategorised' : (catLabel[code] || code),
      amt: byCat[code]
    })).sort((a, b) => a.label.localeCompare(b.label)).map(r =>
      '<tr><td>' + r.label + '</td><td class="amt">' + fmt(r.amt) + '</td></tr>'
    ).join('');
    // dining is paid on the credit card; roll it up as a single Dining row
    if (dining > 0) {
      rows += '<tr><td>Dining</td><td class="amt">' + fmt(dining) + '</td></tr>';
      total += dining;
    }
    const html = '<div class="person">' +
      '<div class="blocktitle">' + title + '</div>' +
      '<div class="subtitle">By category</div><table><tbody>' + rows +
        '<tr class="total"><td>Total</td><td class="amt">' + fmt(total) + '</td></tr></tbody></table>' +
      '</div>';
    return { html: html, total: total };
  }

  function buildFooter(names, tiers, pensContribs, avails, creditTotal, paypalTotal) {
    const sumAvail = names.reduce((s, n) => s + (avails[n] || 0), 0);
    const cc = Number(creditTotal) || 0;
    const pp = Number(paypalTotal) || 0;
    const totalCash = sumAvail - cc - pp;
    const ccRow = cc > 0 ? '<tr class="total"><td>Less credit card spending</td><td class="amt neg">\u2212' + fmt(cc) + '</td></tr>' : '';
    const ppRow = pp > 0 ? '<tr class="total"><td>Less PayPal spending</td><td class="amt neg">\u2212' + fmt(pp) + '</td></tr>' : '';
    return '<div class="person">' +
      '<div class="card-head">' +
        '<div class="blocktitle">Cash Summary</div>' +
      '</div>' +
      '<div class="card-scroll"><table><tbody>' +
        '<tr><td colspan="2" class="muted" style="padding:10px 12px;">Each person\u2019s pension contributions appear under their own accounts above. Credit card and PayPal spending are deducted below.</td></tr>' +
      '</tbody></table></div>' +
      '<div class="card-foot"><table><tbody>' +
        '<tr class="total"><td>Sum of available (both)</td><td class="amt">' + fmt(sumAvail) + '</td></tr>' +
        ccRow +
        ppRow +
        '<tr class="avail"><td>Total cash available</td><td class="amt">' + fmt(totalCash) + '</td></tr></tbody></table>' +
      '</div>' +
      '</div>';
  }

  window.addEventListener('message', e => { if (e && e.data === 'refresh-data') load(); });
  App.requireLogin(load, { title: 'Monthly Budget' });
</script>
</body>
</html>
