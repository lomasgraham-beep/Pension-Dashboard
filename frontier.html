<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retire Frontier</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js?v=hol1"></script>
<script src="engine.js?v=ann5"></script>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<style>
  :root {
    --accent:#1d3a63; --safe:#10b981; --risk:#ef4444;
    --ink:#2c3e50; --sub:#64748b; --line:#d3e3e3;
    --bg:#e8f0f0; --panel:#ffffff; --panelborder:#d4e4e4;
    --shadow:0 1px 3px rgba(15,52,52,0.10); --headbg:#ffffff;
  }
  html, body { height:100%; }
  body { font-family:'Segoe UI',Tahoma,sans-serif; margin:0; background:var(--bg); color:var(--ink);
         display:flex; flex-direction:column; overflow:hidden; }

  #status { position:absolute; top:8px; left:50%; transform:translateX(-50%); z-index:30;
            padding:6px 14px; border-radius:6px; font-weight:bold; font-size:13px; }
  .s-load { background:#eff6ff; color:#1e3a8a; } .s-err { background:#fdecea; color:#c0392b; }

  .head { flex:none; display:flex; flex-direction:column; gap:5px;
          padding:7px 14px 8px; background:var(--headbg); border-bottom:2px solid var(--line); }
  .hrow { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .h-title { font-size:15px; font-weight:700; }
  .seg { display:inline-flex; border:1px solid var(--panelborder); border-radius:9px; overflow:hidden; background:var(--panel); }
  .seg-btn { border:0; background:transparent; color:var(--sub); font-size:12px; font-weight:700; padding:6px 13px;
             cursor:pointer; border-left:1px solid var(--panelborder); -webkit-tap-highlight-color:transparent; }
  .seg-btn:first-child { border-left:0; }
  .seg-btn.active { background:var(--accent); color:#ffffff; }
  .h-sub { font-size:12px; color:var(--sub); line-height:1.3; }
  .h-sub b { color:var(--ink); }
  .ctl { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--sub); }
  .ctl b { color:var(--ink); }
  .ctl .out, .ctlgrid .out { color:var(--accent); font-weight:700; }
  .ctl .step, .ctlgrid .step { width:36px; height:36px; font-size:22px; line-height:1; font-weight:700; padding:0;
               border:1px solid var(--panelborder); background:var(--panel); color:var(--ink); border-radius:9px;
               cursor:pointer; display:inline-flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
  .ctl .step:active, .ctlgrid .step:active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .ctl input[type=range], .ctlgrid input[type=range] { -webkit-appearance:none; appearance:none; width:230px; height:34px;
                           background:transparent; margin:0; cursor:pointer; }
  .ctl input[type=range]::-webkit-slider-runnable-track, .ctlgrid input[type=range]::-webkit-slider-runnable-track { height:12px; border-radius:7px;
                           background:linear-gradient(90deg,#16a34a 0%,#f59e0b 50%,#dc2626 100%); }
  .ctl input[type=range]::-webkit-slider-thumb, .ctlgrid input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:32px; height:32px;
                           border-radius:50%; background:#fff; border:4px solid var(--accent); margin-top:-10px;
                           box-shadow:0 1px 5px rgba(0,0,0,.4); }
  .ctl input[type=range]::-moz-range-track, .ctlgrid input[type=range]::-moz-range-track { height:12px; border-radius:7px;
                           background:linear-gradient(90deg,#16a34a 0%,#f59e0b 50%,#dc2626 100%); }
  .ctl input[type=range]::-moz-range-thumb, .ctlgrid input[type=range]::-moz-range-thumb { width:32px; height:32px; border-radius:50%; background:#fff;
                           border:4px solid var(--accent); box-shadow:0 1px 5px rgba(0,0,0,.4); }
  /* colour rule: colour = risk. A date is not a risk level, so the retire-date track is neutral. */
  .ctlgrid #dateTest::-webkit-slider-runnable-track { background:var(--panelborder); }
  .ctlgrid #dateTest::-moz-range-track { background:var(--panelborder); }
  .ctl .spendVal, .ctlgrid .spendVal { min-width:42px; text-align:right; font-size:15px; }
  /* two-row control grid: keeps the spend + date sliders vertically aligned */
  .ctlgrid { display:grid; grid-template-columns:auto 36px 230px 36px auto minmax(0,auto);
             align-items:center; column-gap:7px; row-gap:9px; font-size:12px; color:var(--sub); }
  .ctlgrid .clabel { justify-self:end; white-space:nowrap; }
  .ctlgrid .dlabel { display:inline-flex; align-items:center; gap:7px; }
  .ctlgrid .cread { justify-self:start; white-space:nowrap; }
  .ctlgrid.dt-off .dgrey { opacity:.42; }
  .ctlgrid.dt-off .step { cursor:default; }
  .legend { display:flex; align-items:center; gap:14px; font-size:12px; flex-wrap:wrap; }
  .legend .key { display:inline-flex; align-items:center; gap:6px; }
  .legend .sw { width:14px; height:10px; border-radius:3px; display:inline-block; }
  .legend .dot { width:12px; height:12px; border-radius:50%; display:inline-block; border:2px solid #fff; box-shadow:0 0 0 1px var(--accent); }

  .wrap { flex:1 1 auto; min-height:0; position:relative; padding:8px 10px 10px; box-sizing:border-box; }
  #fchart { position:absolute; inset:8px 10px 10px; }
  #marker { position:absolute; z-index:6; pointer-events:none; transform:translate(-50%,-50%); }
  #marker .pin { width:14px; height:14px; border-radius:50%; background:var(--accent); border:2px solid #fff;
                 box-shadow:0 0 0 1px var(--accent), 0 1px 3px rgba(0,0,0,.3); }
  #marker .tag { position:absolute; left:50%; bottom:18px; transform:translateX(-50%); white-space:nowrap;
                 font-size:11px; font-weight:700; color:var(--accent); background:var(--panel);
                 border:1px solid var(--panelborder); border-radius:6px; padding:2px 6px; box-shadow:var(--shadow); }
  /* interactive "test spend" reference line + where it crosses the frontier */
  #spendLine { position:absolute; z-index:4; height:0; border-top:2px dashed var(--accent); pointer-events:none; opacity:.85; }
  #crossDot { position:absolute; z-index:5; width:12px; height:12px; border-radius:50%; background:var(--headbg);
              border:3px solid var(--accent); transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer; }
  #crossDot::before { content:''; position:absolute; left:50%; top:50%; width:42px; height:42px;
                      transform:translate(-50%,-50%); border-radius:50%; }
  #crossDot .ctag { position:absolute; left:50%; top:14px; transform:translateX(-50%); white-space:nowrap;
                    font-size:11px; font-weight:700; color:var(--accent); background:var(--panel);
                    border:1px solid var(--panelborder); border-radius:6px; padding:2px 6px; box-shadow:var(--shadow); }
  /* vertical "retire date" reference line (shown only when the date is decoupled) */
  #dateLine { position:absolute; z-index:4; width:0; border-left:2px dashed var(--accent); pointer-events:none; opacity:.7; }
  /* tap-for-breakdown hint + the £ breakdown popover */
  .bd-hint { color:var(--sub); font-weight:700; cursor:pointer; -webkit-tap-highlight-color:transparent; padding:0 3px; user-select:none; }
  .bd-hint:hover { color:var(--accent); }
  #breakdown { position:absolute; z-index:8; width:640px; max-width:92vw; background:var(--panel);
               border:1px solid var(--panelborder); border-radius:12px;
               box-shadow:0 10px 30px rgba(0,0,0,.28), 0 2px 8px rgba(0,0,0,.18);
               padding:0; font-size:12px; color:var(--ink); overflow:hidden; }
  .bd-topbar { display:flex; align-items:center; gap:8px; padding:9px 12px 8px;
               border-bottom:2px solid var(--accent); }
  .bd-head { font-weight:700; font-size:13px; }
  .bd-pill { font-size:11px; font-weight:700; color:#fff; background:var(--accent);
             border-radius:999px; padding:1px 9px; letter-spacing:.2px; }
  .bd-summary { padding:7px 12px; font-size:11.5px; color:var(--sub);
                background:rgba(127,170,180,.10); border-bottom:1px solid var(--panelborder); }
  .bd-summary b { color:var(--accent); font-weight:700; }
  .bd-summary .pl { color:var(--ink); font-weight:600; }
  .bd-body { padding:8px 12px 11px; }
  .bd-cols { display:flex; gap:15px; align-items:stretch; }
  .bd-left { flex:1 1 auto; min-width:0; max-height:56vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .bd-close { position:absolute; top:6px; right:9px; width:26px; height:26px; border:0; background:transparent;
              color:var(--sub); font-size:18px; line-height:1; cursor:pointer; border-radius:7px; z-index:2; }
  .bd-close:active { background:var(--panelborder); }
  .bd-tbl { width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; }
  .bd-tbl th { text-align:right; font-weight:600; color:var(--sub); font-size:10px; text-transform:uppercase;
               letter-spacing:.4px; padding:2px 0 4px; border-bottom:1px solid var(--panelborder); }
  .bd-tbl th:first-child { text-align:left; }
  .bd-tbl td { padding:3px 0; text-align:right; white-space:nowrap; }
  .bd-tbl td:first-child { text-align:left; padding-right:8px; white-space:normal; line-height:1.15; }
  .bd-tbl tbody tr:nth-child(odd) td { background:rgba(127,127,127,.055); }
  .bd-chg { padding-left:10px; }
  .bd-chg .bd-cut { color:var(--risk); font-weight:700; display:block; }
  .bd-bartrack { width:46px; height:3px; border-radius:2px; background:rgba(127,127,127,.16);
                 display:inline-block; margin-top:2px; vertical-align:middle; overflow:hidden; }
  .bd-bar { height:100%; background:var(--risk); border-radius:2px; }
  .bd-fixed { color:var(--sub); font-weight:400; }
  .bd-tot td { border-top:2px solid var(--panelborder); padding-top:5px; font-weight:700; background:rgba(127,170,180,.12); }
  .bd-save { color:var(--accent); }
  .bd-note { color:var(--sub); font-size:10px; margin-top:7px; line-height:1.35; }
  /* pot-value mini chart — right-hand column of the breakdown card */
  .pot-wrap { flex:0 0 320px; border-left:1px solid var(--panelborder); padding-left:14px;
              display:flex; flex-direction:column; }
  .pot-title { font-size:11.5px; color:var(--sub); font-weight:600; margin-bottom:4px; }
  #potSvg { flex:1 1 auto; min-height:180px; }
  #potSvg svg { width:100%; height:100%; display:block; }
  .pot-leg { display:flex; gap:13px; margin-top:6px; font-size:11px; color:var(--sub); }
  .pot-leg span { display:inline-flex; align-items:center; gap:5px; }
  .pot-leg i { width:13px; height:3px; border-radius:2px; display:inline-block; }
  .pot-msg { font-size:10.5px; color:var(--sub); padding:44px 0; text-align:center; }
  /* true/false switch to decouple the retire date from the spend */
  .switch { position:relative; display:inline-block; width:44px; height:26px; flex:none; }
  .switch input { opacity:0; width:0; height:0; }
  .switch .sl { position:absolute; inset:0; background:var(--panelborder); border-radius:26px; transition:.15s; cursor:pointer; }
  .switch .sl:before { content:''; position:absolute; height:20px; width:20px; left:3px; top:3px; background:#fff;
                       border-radius:50%; transition:.15s; box-shadow:0 1px 3px rgba(0,0,0,.35); }
  .switch input:checked + .sl { background:var(--accent); }
  .switch input:checked + .sl:before { transform:translateX(18px); }
  .dateVal { min-width:74px; text-align:right; font-size:15px; }

  @media (prefers-color-scheme: dark) {
    :root {
      --accent:#38d6e6; --safe:#34d399; --risk:#f87171;
      --ink:#e2e8f0; --sub:#94a3b8; --line:#334155;
      --bg:#0b1120; --panel:#1e293b; --panelborder:#334155;
      --shadow:0 1px 3px rgba(0,0,0,0.45); --headbg:#0f172a;
    }
    #status.s-load, .s-load { background:#1e293b; color:#93c5fd; }
    #status.s-err, .s-err { background:#3b1d1d; color:#f87171; }
  }
</style>
</head>
<body>
  <div id="status" class="s-load">Loading…</div>

  <div class="head">
    <div class="hrow">
      <span class="h-title">Safe-to-Retire Frontier <span style="font-weight:400;color:var(--sub);font-size:11px;">(build: front21)</span></span>
      <div class="seg" id="seg">
        <button type="button" class="seg-btn active" data-mode="joint">Joint</button>
        <button type="button" class="seg-btn" data-mode="p1" id="segP1">Graham</button>
        <button type="button" class="seg-btn" data-mode="p2" id="segP2">Julie</button>
      </div>
      <div class="legend">
        <span class="key"><span class="sw" id="lgSafe"></span><span id="lgSafeT">Safe</span></span>
        <span class="key"><span class="sw" id="lgMarg"></span><span id="lgMargT">Marginal</span></span>
        <span class="key"><span class="sw" id="lgRisk"></span><span id="lgRiskT">Runs dry</span></span>
        <span class="key"><span class="dot"></span>Your plan</span>
      </div>
    </div>
    <div class="hrow">
      <span class="h-sub" id="hSub">&nbsp;</span>
      <div class="ctlgrid" id="ctlGrid">
        <span class="clabel">Test spend</span>
        <button type="button" class="step" id="spDn" aria-label="Lower spend">&minus;</button>
        <input id="spendTest" type="range" min="20" max="200" step="1" value="70">
        <button type="button" class="step" id="spUp" aria-label="Raise spend">+</button>
        <b id="spendTestVal" class="spendVal">70%</b>
        <span class="cread"><span id="crossLead">&rarr; earliest safe</span> <span class="out" id="crossOut">—</span> <span id="bdHint" class="bd-hint" title="What reduces — tap for a &pound; breakdown">&#9432;</span></span>

        <span class="clabel dlabel"><label class="switch"><input type="checkbox" id="decouple"><span class="sl"></span></label><span class="dgrey">Retire date</span></span>
        <button type="button" class="step dgrey" id="dtDn" aria-label="Earlier date" disabled>&minus;</button>
        <input id="dateTest" class="dgrey" type="range" min="0" max="72" step="1" value="0" disabled>
        <button type="button" class="step dgrey" id="dtUp" aria-label="Later date" disabled>+</button>
        <b id="dateTestVal" class="dateVal dgrey">—</b>
        <span class="cread"></span>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div id="fchart"></div>
    <div id="spendLine" style="display:none;"></div>
    <div id="dateLine" style="display:none;"></div>
    <div id="crossDot" style="display:none;"><div class="ctag" id="crossTag"></div></div>
    <div id="breakdown" style="display:none;">
      <button type="button" class="bd-close" id="bdClose" aria-label="Close">&times;</button>
      <div class="bd-topbar"><span class="bd-head" id="bdHead">Spending plan</span><span class="bd-pill" id="bdPill"></span></div>
      <div class="bd-summary" id="bdSummary"></div>
      <div class="bd-body">
        <div class="bd-cols">
          <div class="bd-left" id="bdBody"></div>
          <div class="pot-wrap" id="potWrap">
            <div class="pot-title">Pot value over time</div>
            <div id="potSvg"></div>
            <div class="pot-leg" id="potLeg"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="marker" style="display:none;"><div class="pin"></div><div class="tag" id="markerTag">Your plan</div></div>
  </div>

<script>
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const HORIZON_YEARS = 6;     // how far ahead to sweep retirement dates
  const STEP_MONTHS = 2;       // resolution of the sweep
  const SPEND_LO = 0, SPEND_HI = 200;   // bisection bounds (% of plan spend)
  const MARGIN = 7;            // +/- % around the line shown as the amber "marginal" caution band

  let data = null, p1Name = 'Graham', p2Name = null, savedBase = null;
  let chartsReady = false, chart = null;
  let frontier = [];           // [{ year:decimal, pct }]
  let plan = null;             // { year:decimal, date, pct }
  let endYear = null, yMax = 100;
  let decoupled = false;       // false = date tracks the spend (earliest-safe); true = date is a free what-if
  let sweepBase = null;        // first-of-current-month; anchors the retire-date slider to the frontier sweep
  let bdOpen = false;          // £ breakdown popover open?
  let catLabel = {};           // bill category_code -> friendly name
  let potTimer = null, potRenderedKey = null;   // debounce for the pot-value mini chart
  let mode = 'joint';          // 'joint' | 'p1' (Graham) | 'p2' (Julie)
  const modeName = () => mode === 'p1' ? p1Name : (mode === 'p2' ? p2Name : 'Joint');
  const isIndiv = () => mode === 'p1' || mode === 'p2';
  const mq = window.matchMedia('(prefers-color-scheme: dark)');
  const isDark = () => mq.matches;

  const decYear = (d) => d.getFullYear() + d.getMonth() / 12;
  const ymLabel = (decY) => { const yr = Math.floor(decY + 1e-6), mo = Math.round((decY - yr) * 12); return MONTHS[(mo % 12 + 12) % 12] + ' ' + yr; };
  const shortGBP = (n) => Math.abs(n) >= 1e6 ? '£' + (n / 1e6).toFixed(1) + 'M' : (Math.abs(n) >= 1e3 ? '£' + Math.round(n / 1e3) + 'K' : '£' + Math.round(n));

  // ---- engine plumbing (mirrors the dashboard cfg; both members retire on the swept date) ----
  // growthDelta (optional) shifts the accumulation growth rate for the uncertainty band.
  function buildPlan(retireDate, growthDelta) {
    const rbm = {};
    if (p1Name) rbm[p1Name] = retireDate;
    if (p2Name) rbm[p2Name] = retireDate;
    return {
      retirementDate: retireDate, retireByMember: rbm,
      growthRate: savedBase.growthRate + (growthDelta || 0),
      phase1Date: savedBase.phase1Date, phase1Days: savedBase.phase1Days,
      phase2Date: savedBase.phase2Date, phase2Days: savedBase.phase2Days,
      p2phase: savedBase.p2phase, gRatio: savedBase.gRatio,
      savingsFundBills: savedBase.savingsFundBills,
      withdrawalMethod: savedBase.withdrawalMethod, crystallisationDate: savedBase.crystallisationDate, ufplsDivertTf: savedBase.ufplsDivertTf,
      retired: false
    };
  }
  function baseFor(retireDate, growthDelta) {
    const pl = buildPlan(retireDate, growthDelta);
    const stateNames = new Set((data.guaranteed || [])
      .map(x => x.income_name).filter(n => n && n.toLowerCase().indexOf('state') >= 0));
    const js = PensionEngine.forecast(data, pl, 1);
    const pots = { graham: Math.max(0, js.graham || 0), julie: Math.max(0, js.julie || 0) };
    const own = js.potsAtOwnRetire
      ? { graham: Math.max(0, js.potsAtOwnRetire.p1 || 0), julie: Math.max(0, js.potsAtOwnRetire.p2 || 0) } : pots;
    return { pl: pl, pots: pots, own: own, startYr: retireDate.getFullYear(),
             sp: PensionEngine.baselineSP(stateNames) };
  }
  function endPots(base, spendPct) {
    const cfg = {
      pots: base.pots, potsAtOwnRetire: base.own, gRatio: savedBase.gRatio,
      spendRed: spendPct / 100, startYear: base.startYr, retirementDate: base.pl.retirementDate,
      retireByMember: base.pl.retireByMember, savingsFundBills: savedBase.savingsFundBills,
      withdrawalMethod: savedBase.withdrawalMethod, crystallisationDate: savedBase.crystallisationDate, ufplsDivertTf: savedBase.ufplsDivertTf,
      sp: base.sp
    };
    const rows = PensionEngine.drawdown(data, cfg) || [];
    if (!rows.length) return null;
    const last = rows[rows.length - 1];
    return { end: last.year,
             g: (last.g_taxFree || 0) + (last.g_taxable || 0),
             j: (last.j_taxFree || 0) + (last.j_taxable || 0) };
  }
  // success test by mode: joint = household pots last; individual = that pot preserved (end >= start)
  function passes(base, spendPct, m) {
    const e = endPots(base, spendPct);
    if (!e) return { ok: true, end: null };
    let ok;
    if (m === 'p1') ok = e.g >= base.pots.graham;          // Graham's DC pot maintained or grown
    else if (m === 'p2') ok = e.j >= base.pots.julie;      // Julie's DC pot maintained or grown
    else ok = (e.g + e.j) >= 1000;                          // joint: household pots last
    return { ok: ok, end: e.end };
  }
  // highest spend % that still meets the test (monotonic: more spend -> harder to pass)
  function maxSafeSpend(base, m) {
    const hi0 = passes(base, SPEND_HI, m);
    if (hi0.ok) return { pct: SPEND_HI, end: hi0.end };
    let lo = SPEND_LO, hi = SPEND_HI, endY = null;
    for (let i = 0; i < 9; i++) {
      const mid = (lo + hi) / 2;
      const r = passes(base, mid, m);
      if (r.end != null) endY = r.end;
      if (r.ok) lo = mid; else hi = mid;
    }
    return { pct: lo, end: endY };
  }

  function computeFrontier() {
    frontier = []; endYear = null;
    const now = new Date();
    const base0 = new Date(now.getFullYear(), now.getMonth(), 1);
    sweepBase = base0;
    for (let m = 0; m <= HORIZON_YEARS * 12; m += STEP_MONTHS) {
      const d = new Date(base0.getFullYear(), base0.getMonth() + m, 1);
      const res = maxSafeSpend(baseFor(d), mode);
      if (res.end != null) endYear = res.end;
      frontier.push({ year: decYear(d), pct: res.pct });
    }
    // current plan marker (household fully-retired date = later of the two saved dates)
    plan = null;
    const pd = savedBase.planRetire;
    if (pd) {
      const pBase = baseFor(new Date(pd.getFullYear(), pd.getMonth(), 1));
      const pFront = maxSafeSpend(pBase, mode).pct;
      plan = { year: decYear(pd), date: pd, pct: Math.round(savedBase.planSpend * 100), headroom: pFront };
    }
    let mx = 0; frontier.forEach(p => { if (p.pct > mx) mx = p.pct; });
    if (plan) mx = Math.max(mx, plan.pct);
    yMax = Math.min(SPEND_HI, Math.max(60, Math.ceil((mx + 8) / 10) * 10));
  }

  function applyModeLabels() {
    // legend wording adapts: joint = survival, individual = pot preservation
    const safeT = document.getElementById('lgSafeT'), margT = document.getElementById('lgMargT'), riskT = document.getElementById('lgRiskT');
    if (isIndiv()) { safeT.textContent = 'Grows'; margT.textContent = 'Maintained'; riskT.textContent = 'Shrinks'; }
    else { safeT.textContent = 'Safe'; margT.textContent = 'Marginal'; riskT.textContent = 'Runs dry'; }
    document.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  }

  function buildSubline() {
    const sub = document.getElementById('hSub');
    let t = isIndiv()
      ? '<b>' + modeName() + "</b>'s pot kept whole = the most you can spend before it shrinks by <b>" + (endYear || '?') + '</b> (drawdown split ' + Math.round(savedBase.gRatio * 100) + '% from ' + p1Name + ').'
      : 'Safe = both pots last to <b>' + (endYear || '?') + '</b>.';
    if (plan) {
      const diff = Math.round(plan.headroom - plan.pct);
      const when = ymLabel(plan.year);
      t += ' Plan: retire <b>' + when + '</b> · spend <b>' + plan.pct + '%</b> · '
         + (diff >= 0 ? 'room to <b>' + Math.round(plan.headroom) + '%</b> (+' + diff + ')'
                      : '<b>' + (-diff) + '%</b> over the line');
    }
    sub.innerHTML = t;
    if (plan) document.getElementById('markerTag').textContent = 'Your plan · ' + plan.pct + '%';
    applyModeLabels();
  }

  // earliest retirement date at which a given spend % becomes safe (where it crosses the frontier).
  // returns { year:decimal|null, status:'now'|'cross'|'never' }
  function crossingFor(spendPct) {
    if (!frontier.length) return { year: null, status: 'never' };
    if (spendPct <= frontier[0].pct) return { year: frontier[0].year, status: 'now' };
    const top = frontier[frontier.length - 1];
    if (spendPct > top.pct + 0.01) return { year: null, status: 'never' };
    for (let i = 1; i < frontier.length; i++) {
      if (frontier[i].pct >= spendPct) {
        const a = frontier[i - 1], b = frontier[i];
        const tt = (b.pct === a.pct) ? 0 : (spendPct - a.pct) / (b.pct - a.pct);
        return { year: a.year + tt * (b.year - a.year), status: 'cross' };
      }
    }
    return { year: top.year, status: 'cross' };
  }

  // max safe spend % at a given (decimal) retirement year, read off the computed frontier.
  function frontierPctAt(decY) {
    if (!frontier.length) return 0;
    if (decY <= frontier[0].year) return frontier[0].pct;
    const last = frontier[frontier.length - 1];
    if (decY >= last.year) return last.pct;
    for (let i = 1; i < frontier.length; i++) {
      if (frontier[i].year >= decY) {
        const a = frontier[i - 1], b = frontier[i];
        const tt = (b.year === a.year) ? 0 : (decY - a.year) / (b.year - a.year);
        return a.pct + tt * (b.pct - a.pct);
      }
    }
    return last.pct;
  }
  // verdict for a free (date, spend) point, using the same +/- MARGIN bands the chart draws.
  function verdictAt(decY, spend) {
    const pct = frontierPctAt(decY);
    let kind;
    if (spend <= pct - MARGIN) kind = 'safe';
    else if (spend <= pct + MARGIN) kind = 'marg';
    else kind = 'risk';
    return { kind: kind, pct: pct };
  }
  // retire-date slider (whole-month offsets from the sweep start) <-> decimal year / label
  const MAX_MONTHS = () => HORIZON_YEARS * 12;
  function dateFromMonths(mo) { return new Date(sweepBase.getFullYear(), sweepBase.getMonth() + mo, 1); }
  const monthsToYear = (mo) => decYear(dateFromMonths(mo));
  const monthsLabel = (mo) => { const d = dateFromMonths(mo); return MONTHS[d.getMonth()] + ' ' + d.getFullYear(); };
  function yearToMonths(decY) {
    const mo = Math.round((decY - decYear(sweepBase)) * 12);
    return Math.max(0, Math.min(MAX_MONTHS(), mo));
  }

  // ---- £ spending-plan breakdown (tap the dot) ----
  // Computed page-side from the same figures the engine uses, so no engine change: bills scale by
  // the spend slider only when flagged spend_reduction; dining and holidays always scale; everything
  // else is fixed. Figures are per-year, in today's money (pre-inflation, pre age-taper).
  const gbp = (n) => '\u00A3' + Math.round(n).toLocaleString('en-GB');
  const kGBP = (n) => {                       // compact axis money: £0, £120k, £1.2M
    const a = Math.abs(n);
    if (a >= 1e6) return '\u00A3' + (n / 1e6).toFixed(a >= 1e7 ? 0 : 1).replace(/\.0$/, '') + 'M';
    if (a >= 1e3) return '\u00A3' + Math.round(n / 1e3) + 'k';
    return '\u00A3' + Math.round(n);
  };
  function niceMax(v) {                        // round a max up to a clean axis value
    if (v <= 0) return 1;
    const p = Math.pow(10, Math.floor(Math.log10(v))), n = v / p;
    const step = n <= 1 ? 1 : n <= 2 ? 2 : n <= 2.5 ? 2.5 : n <= 5 ? 5 : 10;
    return step * p;
  }
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  function billEffAnnual(b) {
    const full = Number(b.total_annual) || 0;
    if (b.frequency !== 'Monthly') return full;
    const pm = b.pay_months;
    if (!pm || !/^[01]{12}$/.test(pm)) return full;
    const n = (pm.match(/1/g) || []).length;
    return n >= 12 ? full : (Number(b.premium) || 0) * n;
  }
  function spendBreakdown(spendPct) {
    const sr = spendPct / 100, cats = {};
    const add = (key, label, full, reducible) => {
      if (!cats[key]) cats[key] = { label: label, full: 0, reduced: 0 };
      cats[key].full += full;
      cats[key].reduced += reducible ? full * sr : full;
    };
    ((data && data.bills) || []).forEach((b) => {
      const eff = billEffAnnual(b);
      if (eff <= 0) return;
      const code = b.category_code || '\u2014';
      add('b:' + code, catLabel[code] || code, eff, !!b.spend_reduction);
    });
    if (Number(data && data.diningAnnual) > 0) add('dining', 'Dining out', Number(data.diningAnnual), true);
    if (Number(data && data.holidayAnnual) > 0) add('holiday', 'Holidays', Number(data.holidayAnnual), true);
    const rows = Object.keys(cats).map((k) => {
      const c = cats[k];
      return { label: c.label, full: c.full, reduced: c.reduced, cut: c.full - c.reduced };
    }).sort((a, b) => (b.cut - a.cut) || (b.full - a.full));
    const total = rows.reduce((t, r) => ({ full: t.full + r.full, reduced: t.reduced + r.reduced, cut: t.cut + r.cut }),
                              { full: 0, reduced: 0, cut: 0 });
    return { rows: rows, total: total };
  }
  function renderBreakdown(spendPct) {
    const bd = spendBreakdown(spendPct);
    document.getElementById('bdPill').textContent = spendPct + '%';
    const savePct = bd.total.full > 0 ? Math.round(bd.total.cut / bd.total.full * 100) : 0;
    document.getElementById('bdSummary').innerHTML =
      'Save <b>' + gbp(bd.total.cut) + '</b> \u00B7 ' + savePct + '% of plan \u00B7 '
      + '<span class="pl">' + gbp(bd.total.full) + '</span> \u2192 <span class="pl">' + gbp(bd.total.reduced) + '</span>/yr';
    const maxCut = Math.max(1, ...bd.rows.map(r => r.cut));
    let html = '<table class="bd-tbl"><thead><tr><th>Category</th><th>Plan</th><th>At ' + spendPct + '%</th><th>Change</th></tr></thead><tbody>';
    bd.rows.forEach((r) => {
      let change;
      if (r.cut > 0.5) {
        const w = Math.max(6, Math.round(r.cut / maxCut * 100));
        change = '<span class="bd-cut">&minus;' + gbp(r.cut) + '</span>'
               + '<span class="bd-bartrack"><span class="bd-bar" style="width:' + w + '%"></span></span>';
      } else {
        change = '<span class="bd-fixed">fixed</span>';
      }
      html += '<tr><td>' + esc(r.label) + '</td><td>' + gbp(r.full) + '</td><td>' + gbp(r.reduced)
            + '</td><td class="bd-chg">' + change + '</td></tr>';
    });
    html += '</tbody><tfoot><tr class="bd-tot"><td>Total</td><td>' + gbp(bd.total.full) + '</td><td>' + gbp(bd.total.reduced)
          + '</td><td class="bd-chg bd-save">&minus;' + gbp(bd.total.cut) + '</td></tr></tfoot></table>'
          + '<div class="bd-note">Per year, in today\u2019s money. Fixed essentials don\u2019t move with the slider.</div>';
    document.getElementById('bdBody').innerHTML = html;
  }
  function positionBreakdown(ax, ay) {
    const pop = document.getElementById('breakdown');
    const wrap = document.querySelector('.wrap');
    if (!wrap) return;
    const W = wrap.clientWidth, H = wrap.clientHeight;
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    let left = Math.max(6, Math.min(W - pw - 6, ax - pw / 2));
    let top = ay - ph - 16;               // prefer above the dot
    if (top < 6) top = ay + 18;           // otherwise below
    top = Math.max(6, Math.min(H - ph - 6, top));
    pop.style.left = left + 'px';
    pop.style.top = top + 'px';
  }
  // keep the popover live with the slider and pinned to the dot (or chart centre if the dot is hidden)
  function followBreakdown(dot, area, baseX, baseY) {
    if (!bdOpen) return;
    renderBreakdown(Number(document.getElementById('spendTest').value));
    let ax, ay;
    if (dot.style.display === 'block') { ax = parseFloat(dot.style.left) || 0; ay = parseFloat(dot.style.top) || 0; }
    else if (area) { ax = baseX + area.left + area.width / 2; ay = baseY + area.top + 20; }
    else { ax = 60; ay = 60; }
    positionBreakdown(ax, ay);
    schedulePotChart(Number(document.getElementById('dateTest').value), Number(document.getElementById('spendTest').value));
  }
  function openBreakdown() {
    bdOpen = true;
    document.getElementById('breakdown').style.display = 'block';
    potRenderedKey = null;
    renderBreakdown(Number(document.getElementById('spendTest').value));   // table first, so the chart column can match its height
    placeOverlays();                                                       // positions the card
    requestAnimationFrame(() => {                                          // after layout, the column has its full height
      if (!bdOpen) return;
      const mo = Number(document.getElementById('dateTest').value), sp = Number(document.getElementById('spendTest').value);
      renderPotChart(mo, sp); potRenderedKey = mo + '|' + sp;
    });
  }
  function closeBreakdown() { bdOpen = false; document.getElementById('breakdown').style.display = 'none'; }
  function toggleBreakdown(e) { if (e) e.stopPropagation(); if (bdOpen) closeBreakdown(); else openBreakdown(); }

  // ---- pot-value mini chart (runs one engine drawdown for the current date + spend) ----
  const POT_COMB = 'var(--accent)', POT_G = '#6ea8fe', POT_J = '#c58bf2';
  function potTrajectory(monthOffset, spendPct, growthDelta) {
    if (!data || !savedBase) return null;
    try {
      const base = baseFor(dateFromMonths(monthOffset), growthDelta);
      const cfg = {
        pots: base.pots, potsAtOwnRetire: base.own, gRatio: savedBase.gRatio,
        spendRed: spendPct / 100, startYear: base.startYr, retirementDate: base.pl.retirementDate,
        retireByMember: base.pl.retireByMember, savingsFundBills: savedBase.savingsFundBills,
        withdrawalMethod: savedBase.withdrawalMethod, crystallisationDate: savedBase.crystallisationDate,
        ufplsDivertTf: savedBase.ufplsDivertTf, sp: base.sp
      };
      const rows = PensionEngine.drawdown(data, cfg) || [];
      if (!rows.length) return null;
      return rows.map(r => ({ year: r.year, g: Math.max(0, r.g_closing || 0), j: Math.max(0, r.j_closing || 0), c: Math.max(0, r.combinedClosing || 0) }));
    } catch (e) { return null; }
  }
  function potChartSVG(series, W, H, band) {
    const padL = 46, padR = 12, padT = 14, padB = 24;
    const x0 = padL, x1 = W - padR, yb = H - padB, yt = padT;
    const minYr = series[0].year, maxYr = series[series.length - 1].year;
    const bandMax = (band && band.hi) ? Math.max(0, ...band.hi.map(s => s.c)) : 0;
    const maxV = niceMax(Math.max(1, bandMax, ...series.map(s => s.c)));
    const sx = (yr) => x0 + (maxYr === minYr ? 0 : (yr - minYr) / (maxYr - minYr)) * (x1 - x0);
    const sy = (v) => yb - (Math.min(v, maxV) / maxV) * (yb - yt);
    const pts = (key) => series.map((s, i) => (i ? 'L' : 'M') + sx(s.year).toFixed(1) + ' ' + sy(s[key]).toFixed(1)).join(' ');
    const line = (key, col, w) => '<path d="' + pts(key) + '" style="fill:none;stroke:' + col + ';stroke-width:' + w + '" stroke-linejoin="round" stroke-linecap="round"/>';
    const FS = 11;  // label font size (px)

    let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';
    // y gridlines + compact £ labels
    for (let t = 0; t <= 4; t++) {
      const v = maxV * t / 4, y = sy(v);
      svg += '<line x1="' + x0 + '" y1="' + y.toFixed(1) + '" x2="' + x1 + '" y2="' + y.toFixed(1) + '" style="stroke:var(--panelborder);stroke-width:1;opacity:' + (t === 0 ? '1' : '.45') + '"/>';
      svg += '<text x="' + (x0 - 5) + '" y="' + (y + FS / 3).toFixed(1) + '" font-size="' + FS + '" text-anchor="end" style="fill:var(--sub)">' + kGBP(v) + '</text>';
    }
    // x ticks (years) with faint gridlines
    const span = maxYr - minYr, nice = [1, 2, 5, 10, 20, 25, 50];
    let step = Math.max(1, Math.round(span / 4));
    step = nice.find(s => s >= step) || step;
    const xs = [];
    for (let y = minYr; y <= maxYr + 0.001; y += step) xs.push(Math.round(y));
    while (xs.length && Math.abs(xs[xs.length - 1] - maxYr) < step * 0.5) xs.pop();
    xs.push(maxYr);
    xs.forEach((yr) => {
      const xx = sx(yr);
      svg += '<line x1="' + xx.toFixed(1) + '" y1="' + yt + '" x2="' + xx.toFixed(1) + '" y2="' + yb + '" style="stroke:var(--panelborder);stroke-width:1;opacity:.25"/>';
      svg += '<text x="' + xx.toFixed(1) + '" y="' + (H - 7) + '" font-size="' + FS + '" text-anchor="middle" style="fill:var(--sub)">' + yr + '</text>';
    });
    // uncertainty band: envelope between the low/high growth-to-retirement runs
    if (band && band.lo && band.hi && band.lo.length > 1 && band.hi.length > 1) {
      const bp = (arr) => arr.map((s, i) => (i ? 'L' : 'M') + sx(s.year).toFixed(1) + ' ' + sy(s.c).toFixed(1)).join(' ');
      const back = band.lo.slice().reverse().map(s => 'L' + sx(s.year).toFixed(1) + ' ' + sy(s.c).toFixed(1)).join(' ');
      svg += '<path d="' + bp(band.hi) + ' ' + back + ' Z" style="fill:var(--accent);opacity:.13;stroke:none"/>';
    }
    // lean-years shading: the contiguous run of years around the trough where the pot sits near its floor
    const troughIdx = series.reduce((mi, s, i) => (s.c < series[mi].c ? i : mi), 0);
    const trough = series[troughIdx];
    const nearFloor = Math.max(trough.c * 1.25, trough.c + maxV * 0.04);
    let li = troughIdx, ri = troughIdx;
    while (li > 0 && series[li - 1].c <= nearFloor) li--;
    while (ri < series.length - 1 && series[ri + 1].c <= nearFloor) ri++;
    if (ri > li && trough.year > minYr && trough.year < maxYr) {
      svg += '<rect x="' + sx(series[li].year).toFixed(1) + '" y="' + yt + '" width="'
           + (sx(series[ri].year) - sx(series[li].year)).toFixed(1) + '" height="' + (yb - yt)
           + '" style="fill:var(--marg);opacity:.10"/>';
    }
    // soft fill under the combined line
    svg += '<path d="' + pts('c') + ' L' + sx(maxYr).toFixed(1) + ' ' + yb.toFixed(1) + ' L' + sx(minYr).toFixed(1) + ' ' + yb.toFixed(1) + ' Z" style="fill:var(--accent);opacity:.10;stroke:none"/>';
    // lines
    if (p2Name) svg += line('j', POT_J, 1.8);
    svg += line('g', POT_G, 1.8) + line('c', POT_COMB, 2.8);
    // trough marker (amber; red if the pot empties) — the decision point
    const dry = series.find(s => s.c <= 1);
    if (trough.year > minYr) {
      const tCol = trough.c <= 1 ? 'var(--risk)' : 'var(--marg)';
      const tx = sx(trough.year), ty = sy(trough.c);
      svg += '<circle cx="' + tx.toFixed(1) + '" cy="' + ty.toFixed(1) + '" r="3.6" style="fill:' + tCol + '"/>';
      const anchor = (tx > (x0 + x1) / 2) ? 'end' : 'start';
      const lx = anchor === 'end' ? tx - 6 : tx + 6;
      svg += '<text x="' + lx.toFixed(1) + '" y="' + Math.max(yt + FS, ty - 7).toFixed(1) + '" font-size="' + FS + '" text-anchor="' + anchor + '" style="fill:' + tCol + ';font-weight:700">low ' + kGBP(trough.c) + ' \u00B7 ' + trough.year + '</text>';
    }
    // end marker + value
    const last = series[series.length - 1], ex = sx(last.year), ey = sy(last.c);
    svg += '<circle cx="' + ex.toFixed(1) + '" cy="' + ey.toFixed(1) + '" r="3" style="fill:var(--accent)"/>';
    svg += '<text x="' + (ex - 5).toFixed(1) + '" y="' + (ey - 5).toFixed(1) + '" font-size="' + FS + '" text-anchor="end" style="fill:var(--ink);font-weight:700">' + kGBP(last.c) + '</text>';
    // runs-dry flag (combined pot hits zero before the horizon)
    if (dry && dry.year < maxYr) {
      const dx = sx(dry.year);
      svg += '<line x1="' + dx.toFixed(1) + '" y1="' + yt + '" x2="' + dx.toFixed(1) + '" y2="' + yb + '" style="stroke:var(--risk);stroke-width:1.5;stroke-dasharray:3 2;opacity:.85"/>';
      svg += '<text x="' + (dx + 4).toFixed(1) + '" y="' + (yt + FS) + '" font-size="' + (FS - 0.5) + '" style="fill:var(--risk);font-weight:700">dry ' + dry.year + '</text>';
    }
    return svg + '</svg>';
  }
  function renderPotChart(monthOffset, spendPct) {
    const svgBox = document.getElementById('potSvg'), leg = document.getElementById('potLeg');
    const series = potTrajectory(monthOffset, spendPct);
    if (!series || series.length < 2) { svgBox.innerHTML = '<div class="pot-msg">Pot projection unavailable</div>'; leg.innerHTML = ''; return; }
    // uncertainty band: growth-to-retirement ±2% (drawdown-phase growth is fixed in the engine)
    const band = { lo: potTrajectory(monthOffset, spendPct, -0.02), hi: potTrajectory(monthOffset, spendPct, 0.02) };
    const W = Math.max(220, Math.round(svgBox.clientWidth) || 290);
    const H = Math.max(170, Math.round(svgBox.clientHeight) || 320);
    svgBox.innerHTML = potChartSVG(series, W, H, band);
    leg.innerHTML = '<span><i style="background:' + POT_COMB + '"></i>Combined</span>'
      + '<span><i style="background:' + POT_G + '"></i>' + esc(p1Name || 'Graham') + '</span>'
      + (p2Name ? '<span><i style="background:' + POT_J + '"></i>' + esc(p2Name) + '</span>' : '')
      + '<span><i style="background:var(--accent);opacity:.25;height:8px"></i>growth \u00B12%</span>';
  }
  function schedulePotChart(monthOffset, spendPct) {
    if (potTimer) clearTimeout(potTimer);
    potTimer = setTimeout(() => {
      const key = monthOffset + '|' + spendPct;
      if (key === potRenderedKey) return;
      potRenderedKey = key;
      renderPotChart(monthOffset, spendPct);
    }, 170);
  }

  function draw() {
    if (!chartsReady || !frontier.length) return;
    const host = document.getElementById('fchart');
    const w = host.clientWidth, h = host.clientHeight;
    if (w < 8 || h < 8) return;

    const dark = isDark();
    const ax = dark ? '#94a3b8' : '#64748b';
    const gl = dark ? '#64748b' : '#94a3b8';        // strong so gridlines read over the bolder fills
    const safeC = dark ? '#22c55e' : '#16a34a';
    const margC = dark ? '#fbbf24' : '#f59e0b';
    const riskC = dark ? '#f87171' : '#dc2626';
    const tipBg = dark ? '#0f172a' : '#ffffff';
    const tipInk = dark ? '#e2e8f0' : '#2c3e50';

    // colour the legend swatches to match
    document.getElementById('lgSafe').style.background = safeC;
    document.getElementById('lgMarg').style.background = margC;
    document.getElementById('lgRisk').style.background = riskC;

    const who = modeName();
    const tip = (decY, pct, kind) => {
      const lab = ymLabel(decY), v = Math.round(pct);
      let line;
      if (isIndiv()) {
        if (kind === 'safe') line = '<span style="color:' + safeC + ';font-weight:700;">Grows</span> — spend up to <b>' + (v - MARGIN) + '%</b> and ' + who + "'s pot keeps building";
        else if (kind === 'marg') line = '<span style="color:' + margC + ';font-weight:700;">Maintained</span> — around <b>' + v + '%</b> ' + who + "'s pot just holds its value";
        else line = '<span style="color:' + riskC + ';font-weight:700;">Shrinks</span> — above <b>' + v + '%</b> ' + who + "'s pot is eroded by " + (endYear || '?');
      } else {
        if (kind === 'safe') line = '<span style="color:' + safeC + ';font-weight:700;">Safe</span> — spend up to <b>' + (v - MARGIN) + '%</b> with room to spare';
        else if (kind === 'marg') line = '<span style="color:' + margC + ';font-weight:700;">Marginal</span> — around <b>' + v + '%</b> the pots only just last';
        else line = '<span style="color:' + riskC + ';font-weight:700;">Runs dry</span> — above <b>' + v + '%</b> the pots empty before ' + (endYear || '?');
      }
      return '<div style="padding:7px 10px;font-family:Segoe UI,sans-serif;font-size:12px;line-height:1.5;'
           + 'white-space:nowrap;background:' + tipBg + ';color:' + tipInk + ';"><b>Retire ' + lab + '</b><br>' + line + '</div>';
    };

    const dt = new google.visualization.DataTable();
    dt.addColumn('number', 'Retire year');
    dt.addColumn('number', 'Safe');
    dt.addColumn({ type: 'string', role: 'tooltip', p: { html: true } });
    dt.addColumn('number', 'Marginal');
    dt.addColumn({ type: 'string', role: 'tooltip', p: { html: true } });
    dt.addColumn('number', 'Runs dry');
    dt.addColumn({ type: 'string', role: 'tooltip', p: { html: true } });
    frontier.forEach(p => {
      const g = Math.max(0, Math.min(yMax, p.pct - MARGIN));
      const aTop = Math.max(0, Math.min(yMax, p.pct + MARGIN));
      const a = Math.max(0, aTop - g);
      const r = Math.max(0, yMax - (g + a));
      dt.addRow([p.year, g, tip(p.year, p.pct, 'safe'), a, tip(p.year, p.pct, 'marg'), r, tip(p.year, p.pct, 'risk')]);
    });

    const x0 = frontier[0].year, x1 = frontier[frontier.length - 1].year;
    const xticks = [];
    for (let y = Math.ceil(x0); y <= Math.floor(x1) + 0.001; y++) xticks.push({ v: y, f: String(y) });
    const yticks = [];
    for (let v = 0; v <= yMax + 0.001; v += 20) yticks.push({ v: v, f: v + '%' });

    chart = new google.visualization.AreaChart(host);
    google.visualization.events.addListener(chart, 'ready', placeOverlays);
    chart.draw(dt, {
      isStacked: true, backgroundColor: 'transparent', legend: 'none',
      colors: [safeC, margC, riskC], areaOpacity: 0.5,
      lineWidth: 0, series: { 0: { lineWidth: 0 }, 1: { lineWidth: 0 }, 2: { lineWidth: 0 } },
      tooltip: { isHtml: true },
      width: w, height: h,
      chartArea: { left: 70, top: 16, right: 20, bottom: 46, width: '83%', height: '78%' },
      hAxis: { title: 'Retirement date', ticks: xticks, format: '####',
               textStyle: { fontSize: 14, color: ax }, titleTextStyle: { fontSize: 14, color: ax, italic: false },
               gridlines: { color: gl }, minorGridlines: { count: 0 }, baselineColor: gl, viewWindow: { min: x0, max: x1 } },
      vAxis: { title: 'Spend (% of plan)', viewWindow: { min: 0, max: yMax }, ticks: yticks,
               textStyle: { fontSize: 14, color: ax }, titleTextStyle: { fontSize: 14, color: ax, italic: false },
               gridlines: { color: gl }, minorGridlines: { count: 0 }, baselineColor: gl } });
  }

  function placeOverlays() {
    if (!chart) return;
    let cli;
    try { cli = chart.getChartLayoutInterface(); } catch (e) { return; }
    const wrapR = document.querySelector('.wrap').getBoundingClientRect();
    const hostR = document.getElementById('fchart').getBoundingClientRect();
    const baseX = hostR.left - wrapR.left, baseY = hostR.top - wrapR.top;
    let area = null; try { area = cli.getChartAreaBoundingBox(); } catch (e) { area = null; }

    // your-plan marker
    const mk = document.getElementById('marker');
    if (plan) {
      const px = cli.getXLocation(plan.year), py = cli.getYLocation(plan.pct);
      if (isFinite(px) && isFinite(py)) {
        mk.style.left = (baseX + px) + 'px'; mk.style.top = (baseY + py) + 'px'; mk.style.display = 'block';
      } else mk.style.display = 'none';
    } else mk.style.display = 'none';

    // interactive "test spend" line + crossing dot + readout
    const spend = Number(document.getElementById('spendTest').value);
    document.getElementById('spendTestVal').textContent = spend + '%';
    const line = document.getElementById('spendLine');
    const dLine = document.getElementById('dateLine');
    const dot = document.getElementById('crossDot');
    const out = document.getElementById('crossOut');
    const lead = document.getElementById('crossLead');
    const tag = document.getElementById('crossTag');
    const ly = cli.getYLocation(spend);
    if (area && isFinite(ly)) {
      line.style.left = (baseX + area.left) + 'px';
      line.style.width = area.width + 'px';
      line.style.top = (baseY + ly) + 'px';
      line.style.display = 'block';
    } else line.style.display = 'none';

    if (decoupled) {
      // ---- date decoupled: the dot is a free what-if point at (chosen date, chosen spend) ----
      const mo = Number(document.getElementById('dateTest').value);
      const dy = monthsToYear(mo);
      document.getElementById('dateTestVal').textContent = monthsLabel(mo);
      const cx = cli.getXLocation(dy);
      // vertical date guide across the plot
      if (area && isFinite(cx)) {
        dLine.style.left = (baseX + cx) + 'px';
        dLine.style.top = (baseY + area.top) + 'px';
        dLine.style.height = area.height + 'px';
        dLine.style.display = 'block';
      } else dLine.style.display = 'none';
      // the free point at the crossing of the two guides
      if (area && isFinite(cx) && isFinite(ly)) {
        dot.style.left = (baseX + cx) + 'px'; dot.style.top = (baseY + ly) + 'px'; dot.style.display = 'block';
        tag.textContent = monthsLabel(mo);
      } else dot.style.display = 'none';
      // verdict readout, coloured to match the chart's bands
      const dark = isDark();
      const colFor = { safe: dark ? '#22c55e' : '#16a34a', marg: dark ? '#fbbf24' : '#f59e0b', risk: dark ? '#f87171' : '#dc2626' };
      const v = verdictAt(dy, spend);
      const word = isIndiv()
        ? (v.kind === 'safe' ? 'Grows' : (v.kind === 'marg' ? 'Maintained' : 'Shrinks'))
        : (v.kind === 'safe' ? 'Safe' : (v.kind === 'marg' ? 'Marginal' : 'Runs dry'));
      const ceil = Math.max(0, Math.round(v.pct - MARGIN));
      lead.innerHTML = '&rarr;';
      out.innerHTML = '<span style="color:' + colFor[v.kind] + ';font-weight:700;">' + word
        + '</span> &middot; <span style="color:var(--sub);font-weight:400;">safe up to</span> <b style="color:var(--ink);">' + ceil + '%</b>';
      followBreakdown(dot, area, baseX, baseY);
      return;
    }

    // ---- coupled (default): the dot rides the frontier at the earliest-safe date ----
    dLine.style.display = 'none';
    lead.innerHTML = '&rarr; earliest safe';
    const cross = crossingFor(spend);
    let parkMonths;
    if (cross.status === 'now') {
      // Safe even at the earliest possible retirement date (the start of the chart).
      // Pin the dot to the left edge on the test-spend line instead of hiding it, so it
      // doesn't appear to fall off the chart when the spend drops below the earliest-safe level.
      out.textContent = 'any date';
      const cx0 = cli.getXLocation(frontier[0].year);
      if (area && isFinite(cx0) && isFinite(ly)) {
        dot.style.left = (baseX + cx0) + 'px'; dot.style.top = (baseY + ly) + 'px'; dot.style.display = 'block';
        tag.textContent = 'now';
      } else dot.style.display = 'none';
      parkMonths = 0;
    } else if (cross.status === 'never') {
      out.textContent = 'not within ' + HORIZON_YEARS + ' yrs'; dot.style.display = 'none';
      parkMonths = MAX_MONTHS();
    } else {
      out.textContent = ymLabel(cross.year);
      const cx = cli.getXLocation(cross.year);
      if (area && isFinite(cx) && isFinite(ly)) {
        dot.style.left = (baseX + cx) + 'px'; dot.style.top = (baseY + ly) + 'px'; dot.style.display = 'block';
        tag.textContent = ymLabel(cross.year);
      } else dot.style.display = 'none';
      parkMonths = yearToMonths(cross.year);
    }
    // park the (disabled) date slider on the derived earliest-safe date, so it's a
    // sensible starting point the instant the toggle is switched on.
    const ds = document.getElementById('dateTest');
    ds.value = parkMonths;
    document.getElementById('dateTestVal').textContent = monthsLabel(parkMonths);
    followBreakdown(dot, area, baseX, baseY);
  }

  // enable/disable + grey the retire-date row to match the decouple state
  function applyDecoupleUI() {
    const ds = document.getElementById('dateTest');
    document.getElementById('ctlGrid').classList.toggle('dt-off', !decoupled);
    ds.disabled = !decoupled;
    document.getElementById('dtDn').disabled = !decoupled;
    document.getElementById('dtUp').disabled = !decoupled;
  }

  async function load() {
    const status = document.getElementById('status');
    try {
      const [members, bills, dining, guaranteed, pensions, contributions, logs, purchases,
             crashes, savingsAccounts, contributionExceptions, workingTiers,
             incomeSources, incomeAmounts, diningRota, mealCost, annuities, holidayPlan, holidayCost, holidaySettings, diningSettings, billCategories] = await Promise.all([
        App.rest('bd_members'), App.rest('bd_household_bills'), App.rest('bd_dining_habits'),
        App.rest('bd_guaranteed_incomes'), App.rest('bd_pensions'),
        App.rest('bd_pension_contributions'), App.rest('op_pension_logs?order=log_date.desc'),
        App.rest('bd_purchases?order=purchase_date.asc'),
        App.rest('bd_market_crashes?order=start_date.asc'),
        App.rest('bd_savings_accounts?order=account_name.asc'),
        App.rest('bd_contribution_exceptions?order=start_date.asc'),
        App.rest('bd_working_tiers?order=from_date.asc'),
        App.rest('bd_income_sources?order=member_name.asc'),
        App.rest('bd_income_amounts?order=member_name.asc'),
        App.rest('bd_dining_rota'), App.rest('bd_meal_cost'),
        App.rest('bd_annuities?order=purchase_date.asc'),
        App.rest('bd_holiday_plan?phase=eq.retired&order=week_no.asc'),
        App.rest('bd_holiday_cost'),
        App.rest('bd_holiday_settings?id=eq.1'),
        App.rest('bd_dining_settings?id=eq.1'),
        App.rest('bd_bill_category?order=code.asc')
      ]);

      catLabel = {};
      (billCategories || []).forEach(c => { if (c.code) catLabel[c.code] = c.description || c.code; });

      const mealCostMap = {};
      (mealCost || []).forEach(c => { mealCostMap[c.meal_type + '|' + c.level] = Number(c.cost) || 0; });
      const DAY_COLS = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
      const diningAnnual = (diningRota || []).reduce((sum, r) =>
        sum + DAY_COLS.reduce((s, col) => s + (r[col] ? (mealCostMap[r.meal_type + '|' + r[col]] || 0) : 0), 0), 0);
      const holidayAnnual = App.holidayAnnual(holidayPlan || [], App.holidayCtx(holidayCost || [], mealCost || [], (holidaySettings && holidaySettings[0]) || {}), 'retired');
      const _hs = (holidaySettings && holidaySettings[0]) || {}, _ds = (diningSettings && diningSettings[0]) || {};
      const holidayTaper = { taper_at_70: _hs.taper_at_70, taper_at_80: _hs.taper_at_80, taper_at_90: _hs.taper_at_90 };
      const diningTaper = { taper_at_70: _ds.taper_at_70, taper_at_80: _ds.taper_at_80, taper_at_90: _ds.taper_at_90 };

      data = { members, bills, dining, diningAnnual: diningAnnual, holidayAnnual: holidayAnnual, holidayTaper: holidayTaper, diningTaper: diningTaper, guaranteed, pensions, contributions, logs,
               purchases: purchases || [], crashes: crashes || [], savingsAccounts: savingsAccounts || [],
               contributionExceptions: contributionExceptions || [], workingTiers: workingTiers || [],
               incomeSources: incomeSources || [], incomeAmounts: incomeAmounts || [],
               annuities: annuities || [] };

      const sortedM = (members || []).slice().sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
      p1Name = sortedM[0] ? sortedM[0].name : 'Graham';
      p2Name = sortedM[1] ? sortedM[1].name : null;
      document.getElementById('segP1').textContent = p1Name;
      if (p2Name) document.getElementById('segP2').textContent = p2Name;
      else document.getElementById('segP2').style.display = 'none';

      const pRows = await App.rest('op_modelling_parameters?member_name=eq.' + encodeURIComponent(p1Name) + '&order=updated_at.desc&limit=1');
      const p = (pRows && pRows.length) ? pRows[0] : {};
      let p2row = null, p2phase = null;
      if (p2Name) {
        const p2Rows = await App.rest('op_modelling_parameters?member_name=eq.' + encodeURIComponent(p2Name) + '&order=updated_at.desc&limit=1');
        p2row = (p2Rows && p2Rows.length) ? p2Rows[0] : null;
        if (p2row) p2phase = {
          phase1Date: App.parseLocalDate(p2row.shorter_week_date_1), phase1Days: p2row.working_days_1 ? Number(p2row.working_days_1) : 5,
          phase2Date: App.parseLocalDate(p2row.shorter_week_date_2), phase2Days: p2row.working_days_2 ? Number(p2row.working_days_2) : 5
        };
      }
      // household planned retirement = later of the two saved dates
      const r1 = App.parseLocalDate(p.retirement_date);
      const r2 = (p2row && p2row.retirement_date) ? App.parseLocalDate(p2row.retirement_date) : null;
      const planRetire = (r1 && r2) ? (r1 > r2 ? r1 : r2) : (r1 || r2);
      savedBase = {
        growthRate: p.pension_growth_rate != null ? Number(p.pension_growth_rate) : 0.05,
        gRatio: p.drawdown_ratio_graham != null ? Number(p.drawdown_ratio_graham) : 0.5,
        savingsFundBills: p.savings_fund_bills != null ? !!p.savings_fund_bills : true,
        withdrawalMethod: { graham: p.withdrawal_method_graham === 'fad' ? 'fad' : 'ufpls', julie: p.withdrawal_method_julie === 'fad' ? 'fad' : 'ufpls' },
        crystallisationDate: {
          graham: p.crystallisation_date_graham ? App.parseLocalDate(p.crystallisation_date_graham) : null,
          julie: p.crystallisation_date_julie ? App.parseLocalDate(p.crystallisation_date_julie) : null
        },
        ufplsDivertTf: !!p.ufpls_divert_tf,
        phase1Date: App.parseLocalDate(p.shorter_week_date_1), phase1Days: p.working_days_1 ? Number(p.working_days_1) : 5,
        phase2Date: App.parseLocalDate(p.shorter_week_date_2), phase2Days: p.working_days_2 ? Number(p.working_days_2) : 5,
        p2phase: p2phase, planRetire: planRetire,
        planSpend: p.spending_reduction_pct != null ? Number(p.spending_reduction_pct) : 1.0
      };

      computeFrontier();
      if (plan) {
        const st = document.getElementById('spendTest');
        st.value = Math.max(20, Math.min(200, plan.pct));
        document.getElementById('spendTestVal').textContent = st.value + '%';
      }
      const ds = document.getElementById('dateTest');
      ds.max = MAX_MONTHS();
      document.getElementById('dateTestVal').textContent = monthsLabel(Number(ds.value));
      applyDecoupleUI();
      buildSubline();
      draw();
      status.style.display = 'none';
    } catch (e) { status.className = 's-err'; status.textContent = 'Could not load: ' + e.message; }
  }

  let rt = null;
  window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(draw, 160); });
  if (mq.addEventListener) mq.addEventListener('change', () => setTimeout(draw, 60));
  document.getElementById('spendTest').addEventListener('input', placeOverlays);
  function nudgeSpend(d) {
    const st = document.getElementById('spendTest');
    st.value = Math.max(20, Math.min(200, Number(st.value) + d));
    placeOverlays();
  }
  document.getElementById('spDn').addEventListener('click', () => nudgeSpend(-1));
  document.getElementById('spUp').addEventListener('click', () => nudgeSpend(1));

  // retire-date slider (only active when decoupled) + month bumps
  document.getElementById('dateTest').addEventListener('input', () => { if (decoupled) placeOverlays(); });
  function nudgeDate(d) {
    if (!decoupled) return;
    const dt = document.getElementById('dateTest');
    dt.value = Math.max(0, Math.min(MAX_MONTHS(), Number(dt.value) + d));
    placeOverlays();
  }
  document.getElementById('dtDn').addEventListener('click', () => nudgeDate(-1));
  document.getElementById('dtUp').addEventListener('click', () => nudgeDate(1));

  // £ breakdown: tap the dot (or the info glyph) to open; tap outside or the x to close
  document.getElementById('crossDot').addEventListener('click', toggleBreakdown);
  document.getElementById('bdHint').addEventListener('click', toggleBreakdown);
  document.getElementById('bdClose').addEventListener('click', (e) => { e.stopPropagation(); closeBreakdown(); });
  document.addEventListener('click', (e) => {
    if (!bdOpen) return;
    const pop = document.getElementById('breakdown');
    const dot = document.getElementById('crossDot');
    const hint = document.getElementById('bdHint');
    if (pop.contains(e.target) || dot.contains(e.target) || hint.contains(e.target)) return;
    closeBreakdown();
  });
  document.getElementById('decouple').addEventListener('change', (e) => {
    decoupled = !!e.target.checked;
    applyDecoupleUI();
    placeOverlays();
  });
  document.getElementById('seg').addEventListener('click', (e) => {
    const b = e.target.closest('.seg-btn'); if (!b || b.dataset.mode === mode) return;
    mode = b.dataset.mode;
    document.querySelectorAll('.seg-btn').forEach(x => x.classList.toggle('active', x.dataset.mode === mode));
    const status = document.getElementById('status');
    status.style.display = 'block'; status.className = 's-load'; status.textContent = 'Recomputing…';
    setTimeout(() => {
      try { computeFrontier(); buildSubline(); draw(); status.style.display = 'none'; }
      catch (err) { status.className = 's-err'; status.textContent = 'Could not compute: ' + err.message; }
    }, 20);
  });
  window.addEventListener('message', (ev) => { if (ev && ev.data === 'refresh-data') load(); });

  google.charts.load('current', { packages: ['corechart'] });
  google.charts.setOnLoadCallback(() => { chartsReady = true; draw(); });
  App.requireLogin(load, { title: 'Retire Frontier' });
</script>
