<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retire Frontier</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js?v=err45"></script>
<script src="engine.js?v=fDine"></script>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<style>
  :root {
    --accent:#2c7a7b; --safe:#10b981; --risk:#ef4444;
    --ink:#2c3e50; --sub:#64748b; --line:#d3e3e3;
    --bg:#e8f0f0; --panel:#ffffff; --panelborder:#d4e4e4;
    --shadow:0 1px 3px rgba(15,52,52,0.10); --headbg:#ffffff;
  }
  html, body { height:100%; }
  body { font-family:'Segoe UI',Tahoma,sans-serif; margin:0; background:var(--bg); color:var(--ink);
         display:flex; flex-direction:column; overflow:hidden; }

  #status { position:absolute; top:8px; left:50%; transform:translateX(-50%); z-index:30;
            padding:6px 14px; border-radius:6px; font-weight:bold; font-size:13px; }
  .s-load { background:#eff6ff; color:#1e3a8a; } .s-err { background:#fdecea; color:#c0392b; }

  .head { flex:none; display:flex; flex-direction:column; gap:5px;
          padding:7px 14px 8px; background:var(--headbg); border-bottom:2px solid var(--line); }
  .hrow { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .h-title { font-size:15px; font-weight:700; }
  .h-sub { font-size:12px; color:var(--sub); line-height:1.3; }
  .h-sub b { color:var(--ink); }
  .ctl { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--sub); }
  .ctl b { color:var(--ink); }
  .ctl .out { color:var(--accent); font-weight:700; }
  .ctl .step { width:36px; height:36px; font-size:22px; line-height:1; font-weight:700; padding:0;
               border:1px solid var(--panelborder); background:var(--panel); color:var(--ink); border-radius:9px;
               cursor:pointer; display:inline-flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
  .ctl .step:active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .ctl input[type=range] { -webkit-appearance:none; appearance:none; width:230px; height:34px;
                           background:transparent; margin:0; cursor:pointer; }
  .ctl input[type=range]::-webkit-slider-runnable-track { height:12px; border-radius:7px;
                           background:linear-gradient(90deg,#16a34a 0%,#f59e0b 50%,#dc2626 100%); }
  .ctl input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:32px; height:32px;
                           border-radius:50%; background:#fff; border:4px solid var(--accent); margin-top:-10px;
                           box-shadow:0 1px 5px rgba(0,0,0,.4); }
  .ctl input[type=range]::-moz-range-track { height:12px; border-radius:7px;
                           background:linear-gradient(90deg,#16a34a 0%,#f59e0b 50%,#dc2626 100%); }
  .ctl input[type=range]::-moz-range-thumb { width:32px; height:32px; border-radius:50%; background:#fff;
                           border:4px solid var(--accent); box-shadow:0 1px 5px rgba(0,0,0,.4); }
  .ctl .spendVal { min-width:42px; text-align:right; font-size:15px; }
  .legend { display:flex; align-items:center; gap:14px; font-size:12px; flex-wrap:wrap; }
  .legend .key { display:inline-flex; align-items:center; gap:6px; }
  .legend .sw { width:14px; height:10px; border-radius:3px; display:inline-block; }
  .legend .dot { width:12px; height:12px; border-radius:50%; display:inline-block; border:2px solid #fff; box-shadow:0 0 0 1px var(--accent); }

  .wrap { flex:1 1 auto; min-height:0; position:relative; padding:8px 10px 10px; box-sizing:border-box; }
  #fchart { position:absolute; inset:8px 10px 10px; }
  #marker { position:absolute; z-index:6; pointer-events:none; transform:translate(-50%,-50%); }
  #marker .pin { width:14px; height:14px; border-radius:50%; background:var(--accent); border:2px solid #fff;
                 box-shadow:0 0 0 1px var(--accent), 0 1px 3px rgba(0,0,0,.3); }
  #marker .tag { position:absolute; left:50%; bottom:18px; transform:translateX(-50%); white-space:nowrap;
                 font-size:11px; font-weight:700; color:var(--accent); background:var(--panel);
                 border:1px solid var(--panelborder); border-radius:6px; padding:2px 6px; box-shadow:var(--shadow); }
  /* interactive "test spend" reference line + where it crosses the frontier */
  #spendLine { position:absolute; z-index:4; height:0; border-top:2px dashed var(--accent); pointer-events:none; opacity:.85; }
  #crossDot { position:absolute; z-index:5; width:12px; height:12px; border-radius:50%; background:var(--headbg);
              border:3px solid var(--accent); transform:translate(-50%,-50%); pointer-events:none; }
  #crossDot .ctag { position:absolute; left:50%; top:14px; transform:translateX(-50%); white-space:nowrap;
                    font-size:11px; font-weight:700; color:var(--accent); background:var(--panel);
                    border:1px solid var(--panelborder); border-radius:6px; padding:2px 6px; box-shadow:var(--shadow); }

  @media (prefers-color-scheme: dark) {
    :root {
      --accent:#5eead4; --safe:#34d399; --risk:#f87171;
      --ink:#e2e8f0; --sub:#94a3b8; --line:#334155;
      --bg:#0b1120; --panel:#1e293b; --panelborder:#334155;
      --shadow:0 1px 3px rgba(0,0,0,0.45); --headbg:#0f172a;
    }
    #status.s-load, .s-load { background:#1e293b; color:#93c5fd; }
    #status.s-err, .s-err { background:#3b1d1d; color:#f87171; }
  }
</style>
</head>
<body>
  <div id="status" class="s-load">Loading…</div>

  <div class="head">
    <div class="hrow">
      <span class="h-title">Safe-to-Retire Frontier <span style="font-weight:400;color:var(--sub);font-size:11px;">(build: front4)</span></span>
      <div class="legend">
        <span class="key"><span class="sw" id="lgSafe"></span>Safe</span>
        <span class="key"><span class="sw" id="lgMarg"></span>Marginal</span>
        <span class="key"><span class="sw" id="lgRisk"></span>Runs dry</span>
        <span class="key"><span class="dot"></span>Your plan</span>
      </div>
    </div>
    <div class="hrow">
      <span class="h-sub" id="hSub">&nbsp;</span>
      <span class="ctl">Test spend
        <button type="button" class="step" id="spDn" aria-label="Lower spend">&minus;</button>
        <input id="spendTest" type="range" min="20" max="200" step="1" value="70">
        <button type="button" class="step" id="spUp" aria-label="Raise spend">+</button>
        <b id="spendTestVal" class="spendVal">70%</b> &rarr; earliest safe <span class="out" id="crossOut">—</span>
      </span>
    </div>
  </div>

  <div class="wrap">
    <div id="fchart"></div>
    <div id="spendLine" style="display:none;"></div>
    <div id="crossDot" style="display:none;"><div class="ctag" id="crossTag"></div></div>
    <div id="marker" style="display:none;"><div class="pin"></div><div class="tag" id="markerTag">Your plan</div></div>
  </div>

<script>
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const HORIZON_YEARS = 6;     // how far ahead to sweep retirement dates
  const STEP_MONTHS = 2;       // resolution of the sweep
  const SPEND_LO = 0, SPEND_HI = 200;   // bisection bounds (% of plan spend)
  const MARGIN = 7;            // +/- % around the line shown as the amber "marginal" caution band

  let data = null, p1Name = 'Graham', p2Name = null, savedBase = null;
  let chartsReady = false, chart = null;
  let frontier = [];           // [{ year:decimal, pct }]
  let plan = null;             // { year:decimal, date, pct }
  let endYear = null, yMax = 100;
  const mq = window.matchMedia('(prefers-color-scheme: dark)');
  const isDark = () => mq.matches;

  const decYear = (d) => d.getFullYear() + d.getMonth() / 12;
  const ymLabel = (decY) => { const yr = Math.floor(decY + 1e-6), mo = Math.round((decY - yr) * 12); return MONTHS[(mo % 12 + 12) % 12] + ' ' + yr; };
  const shortGBP = (n) => Math.abs(n) >= 1e6 ? '£' + (n / 1e6).toFixed(1) + 'M' : (Math.abs(n) >= 1e3 ? '£' + Math.round(n / 1e3) + 'K' : '£' + Math.round(n));

  // ---- engine plumbing (mirrors the dashboard cfg; both members retire on the swept date) ----
  function buildPlan(retireDate) {
    const rbm = {};
    if (p1Name) rbm[p1Name] = retireDate;
    if (p2Name) rbm[p2Name] = retireDate;
    return {
      retirementDate: retireDate, retireByMember: rbm,
      growthRate: savedBase.growthRate,
      phase1Date: savedBase.phase1Date, phase1Days: savedBase.phase1Days,
      phase2Date: savedBase.phase2Date, phase2Days: savedBase.phase2Days,
      p2phase: savedBase.p2phase, gRatio: savedBase.gRatio,
      savingsFundBills: savedBase.savingsFundBills, retired: false
    };
  }
  function baseFor(retireDate) {
    const pl = buildPlan(retireDate);
    const stateNames = new Set((data.guaranteed || [])
      .map(x => x.income_name).filter(n => n && n.toLowerCase().indexOf('state') >= 0));
    const js = PensionEngine.forecast(data, pl, 1);
    const pots = { graham: Math.max(0, js.graham || 0), julie: Math.max(0, js.julie || 0) };
    const own = js.potsAtOwnRetire
      ? { graham: Math.max(0, js.potsAtOwnRetire.p1 || 0), julie: Math.max(0, js.potsAtOwnRetire.p2 || 0) } : pots;
    return { pl: pl, pots: pots, own: own, startYr: retireDate.getFullYear(),
             sp: PensionEngine.baselineSP(stateNames) };
  }
  function drawdownFinal(base, spendPct) {
    const cfg = {
      pots: base.pots, potsAtOwnRetire: base.own, gRatio: savedBase.gRatio,
      spendRed: spendPct / 100, startYear: base.startYr, retirementDate: base.pl.retirementDate,
      retireByMember: base.pl.retireByMember, savingsFundBills: savedBase.savingsFundBills, sp: base.sp
    };
    const rows = PensionEngine.drawdown(data, cfg) || [];
    if (!rows.length) return { survives: true, end: null };
    const last = rows[rows.length - 1];
    const total = (last.g_taxFree || 0) + (last.g_taxable || 0) + (last.j_taxFree || 0) + (last.j_taxable || 0);
    return { survives: total >= 1000, end: last.year };
  }
  // highest spend % whose pots still last to end-of-plan (survival is monotonic in spend)
  function maxSafeSpend(base) {
    const hi0 = drawdownFinal(base, SPEND_HI);
    if (hi0.survives) return { pct: SPEND_HI, end: hi0.end };
    let lo = SPEND_LO, hi = SPEND_HI, endY = null;
    for (let i = 0; i < 9; i++) {
      const mid = (lo + hi) / 2;
      const r = drawdownFinal(base, mid);
      if (r.end != null) endY = r.end;
      if (r.survives) lo = mid; else hi = mid;
    }
    return { pct: lo, end: endY };
  }

  function computeFrontier() {
    frontier = []; endYear = null;
    const now = new Date();
    const base0 = new Date(now.getFullYear(), now.getMonth(), 1);
    for (let m = 0; m <= HORIZON_YEARS * 12; m += STEP_MONTHS) {
      const d = new Date(base0.getFullYear(), base0.getMonth() + m, 1);
      const res = maxSafeSpend(baseFor(d));
      if (res.end != null) endYear = res.end;
      frontier.push({ year: decYear(d), pct: res.pct });
    }
    // current plan marker (household fully-retired date = later of the two saved dates)
    plan = null;
    const pd = savedBase.planRetire;
    if (pd) {
      const pBase = baseFor(new Date(pd.getFullYear(), pd.getMonth(), 1));
      const pFront = maxSafeSpend(pBase).pct;
      plan = { year: decYear(pd), date: pd, pct: Math.round(savedBase.planSpend * 100), headroom: pFront };
    }
    let mx = 0; frontier.forEach(p => { if (p.pct > mx) mx = p.pct; });
    if (plan) mx = Math.max(mx, plan.pct);
    yMax = Math.min(SPEND_HI, Math.max(60, Math.ceil((mx + 8) / 10) * 10));
  }

  function buildSubline() {
    const sub = document.getElementById('hSub');
    let t = 'Safe = both pots last to <b>' + (endYear || '?') + '</b>.';
    if (plan) {
      const diff = Math.round(plan.headroom - plan.pct);
      const when = ymLabel(plan.year);
      t += ' Plan: retire <b>' + when + '</b> · spend <b>' + plan.pct + '%</b> · '
         + (diff >= 0 ? 'room to <b>' + Math.round(plan.headroom) + '%</b> (+' + diff + ')'
                      : '<b>' + (-diff) + '%</b> over the line');
    }
    sub.innerHTML = t;
    if (plan) document.getElementById('markerTag').textContent = 'Your plan · ' + plan.pct + '%';
  }

  // earliest retirement date at which a given spend % becomes safe (where it crosses the frontier).
  // returns { year:decimal|null, status:'now'|'cross'|'never' }
  function crossingFor(spendPct) {
    if (!frontier.length) return { year: null, status: 'never' };
    if (spendPct <= frontier[0].pct) return { year: frontier[0].year, status: 'now' };
    const top = frontier[frontier.length - 1];
    if (spendPct > top.pct + 0.01) return { year: null, status: 'never' };
    for (let i = 1; i < frontier.length; i++) {
      if (frontier[i].pct >= spendPct) {
        const a = frontier[i - 1], b = frontier[i];
        const tt = (b.pct === a.pct) ? 0 : (spendPct - a.pct) / (b.pct - a.pct);
        return { year: a.year + tt * (b.year - a.year), status: 'cross' };
      }
    }
    return { year: top.year, status: 'cross' };
  }

  function draw() {
    if (!chartsReady || !frontier.length) return;
    const host = document.getElementById('fchart');
    const w = host.clientWidth, h = host.clientHeight;
    if (w < 8 || h < 8) return;

    const dark = isDark();
    const ax = dark ? '#94a3b8' : '#64748b';
    const gl = dark ? '#64748b' : '#94a3b8';        // strong so gridlines read over the bolder fills
    const safeC = dark ? '#22c55e' : '#16a34a';
    const margC = dark ? '#fbbf24' : '#f59e0b';
    const riskC = dark ? '#f87171' : '#dc2626';
    const tipBg = dark ? '#0f172a' : '#ffffff';
    const tipInk = dark ? '#e2e8f0' : '#2c3e50';

    // colour the legend swatches to match
    document.getElementById('lgSafe').style.background = safeC;
    document.getElementById('lgMarg').style.background = margC;
    document.getElementById('lgRisk').style.background = riskC;

    const tip = (decY, pct, kind) => {
      const lab = ymLabel(decY), v = Math.round(pct);
      let line;
      if (kind === 'safe') line = '<span style="color:' + safeC + ';font-weight:700;">Safe</span> — spend up to <b>' + (v - MARGIN) + '%</b> with room to spare';
      else if (kind === 'marg') line = '<span style="color:' + margC + ';font-weight:700;">Marginal</span> — around <b>' + v + '%</b> the pots only just last';
      else line = '<span style="color:' + riskC + ';font-weight:700;">Runs dry</span> — above <b>' + v + '%</b> the pots empty before ' + (endYear || '?');
      return '<div style="padding:7px 10px;font-family:Segoe UI,sans-serif;font-size:12px;line-height:1.5;'
           + 'white-space:nowrap;background:' + tipBg + ';color:' + tipInk + ';"><b>Retire ' + lab + '</b><br>' + line + '</div>';
    };

    const dt = new google.visualization.DataTable();
    dt.addColumn('number', 'Retire year');
    dt.addColumn('number', 'Safe');
    dt.addColumn({ type: 'string', role: 'tooltip', p: { html: true } });
    dt.addColumn('number', 'Marginal');
    dt.addColumn({ type: 'string', role: 'tooltip', p: { html: true } });
    dt.addColumn('number', 'Runs dry');
    dt.addColumn({ type: 'string', role: 'tooltip', p: { html: true } });
    frontier.forEach(p => {
      const g = Math.max(0, Math.min(yMax, p.pct - MARGIN));
      const aTop = Math.max(0, Math.min(yMax, p.pct + MARGIN));
      const a = Math.max(0, aTop - g);
      const r = Math.max(0, yMax - (g + a));
      dt.addRow([p.year, g, tip(p.year, p.pct, 'safe'), a, tip(p.year, p.pct, 'marg'), r, tip(p.year, p.pct, 'risk')]);
    });

    const x0 = frontier[0].year, x1 = frontier[frontier.length - 1].year;
    const xticks = [];
    for (let y = Math.ceil(x0); y <= Math.floor(x1) + 0.001; y++) xticks.push({ v: y, f: String(y) });
    const yticks = [];
    for (let v = 0; v <= yMax + 0.001; v += 20) yticks.push({ v: v, f: v + '%' });

    chart = new google.visualization.AreaChart(host);
    google.visualization.events.addListener(chart, 'ready', placeOverlays);
    chart.draw(dt, {
      isStacked: true, backgroundColor: 'transparent', legend: 'none',
      colors: [safeC, margC, riskC], areaOpacity: 0.5,
      lineWidth: 0, series: { 0: { lineWidth: 0 }, 1: { lineWidth: 0 }, 2: { lineWidth: 0 } },
      tooltip: { isHtml: true },
      width: w, height: h,
      chartArea: { left: 56, top: 14, right: 18, bottom: 34, width: '86%', height: '82%' },
      hAxis: { title: 'Retirement date', ticks: xticks, format: '####',
               textStyle: { fontSize: 11, color: ax }, titleTextStyle: { fontSize: 11, color: ax, italic: false },
               gridlines: { color: gl }, minorGridlines: { count: 0 }, baselineColor: gl, viewWindow: { min: x0, max: x1 } },
      vAxis: { title: 'Spend (% of plan)', viewWindow: { min: 0, max: yMax }, ticks: yticks,
               textStyle: { fontSize: 11, color: ax }, titleTextStyle: { fontSize: 11, color: ax, italic: false },
               gridlines: { color: gl }, minorGridlines: { count: 0 }, baselineColor: gl } });
  }

  function placeOverlays() {
    if (!chart) return;
    let cli;
    try { cli = chart.getChartLayoutInterface(); } catch (e) { return; }
    const wrapR = document.querySelector('.wrap').getBoundingClientRect();
    const hostR = document.getElementById('fchart').getBoundingClientRect();
    const baseX = hostR.left - wrapR.left, baseY = hostR.top - wrapR.top;
    let area = null; try { area = cli.getChartAreaBoundingBox(); } catch (e) { area = null; }

    // your-plan marker
    const mk = document.getElementById('marker');
    if (plan) {
      const px = cli.getXLocation(plan.year), py = cli.getYLocation(plan.pct);
      if (isFinite(px) && isFinite(py)) {
        mk.style.left = (baseX + px) + 'px'; mk.style.top = (baseY + py) + 'px'; mk.style.display = 'block';
      } else mk.style.display = 'none';
    } else mk.style.display = 'none';

    // interactive "test spend" line + crossing dot + readout
    const spend = Number(document.getElementById('spendTest').value);
    document.getElementById('spendTestVal').textContent = spend + '%';
    const line = document.getElementById('spendLine');
    const dot = document.getElementById('crossDot');
    const out = document.getElementById('crossOut');
    const ly = cli.getYLocation(spend);
    if (area && isFinite(ly)) {
      line.style.left = (baseX + area.left) + 'px';
      line.style.width = area.width + 'px';
      line.style.top = (baseY + ly) + 'px';
      line.style.display = 'block';
    } else line.style.display = 'none';

    const cross = crossingFor(spend);
    if (cross.status === 'now') {
      out.textContent = 'any date'; dot.style.display = 'none';
      document.getElementById('crossTag').textContent = '';
    } else if (cross.status === 'never') {
      out.textContent = 'not within ' + HORIZON_YEARS + ' yrs'; dot.style.display = 'none';
    } else {
      out.textContent = ymLabel(cross.year);
      const cx = cli.getXLocation(cross.year);
      if (area && isFinite(cx) && isFinite(ly)) {
        dot.style.left = (baseX + cx) + 'px'; dot.style.top = (baseY + ly) + 'px'; dot.style.display = 'block';
        document.getElementById('crossTag').textContent = ymLabel(cross.year);
      } else dot.style.display = 'none';
    }
  }

  async function load() {
    const status = document.getElementById('status');
    try {
      const [members, bills, dining, guaranteed, pensions, contributions, logs, purchases,
             crashes, savingsAccounts, contributionExceptions, workingTiers,
             incomeSources, incomeAmounts, diningRota, mealCost] = await Promise.all([
        App.rest('bd_members'), App.rest('bd_household_bills'), App.rest('bd_dining_habits'),
        App.rest('bd_guaranteed_incomes'), App.rest('bd_pensions'),
        App.rest('bd_pension_contributions'), App.rest('op_pension_logs?order=log_date.desc'),
        App.rest('bd_purchases?order=purchase_date.asc'),
        App.rest('bd_market_crashes?order=start_date.asc'),
        App.rest('bd_savings_accounts?order=account_name.asc'),
        App.rest('bd_contribution_exceptions?order=start_date.asc'),
        App.rest('bd_working_tiers?order=from_date.asc'),
        App.rest('bd_income_sources?order=member_name.asc'),
        App.rest('bd_income_amounts?order=member_name.asc'),
        App.rest('bd_dining_rota'), App.rest('bd_meal_cost')
      ]);

      const mealCostMap = {};
      (mealCost || []).forEach(c => { mealCostMap[c.meal_type + '|' + c.level] = Number(c.cost) || 0; });
      const DAY_COLS = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
      const diningAnnual = (diningRota || []).reduce((sum, r) =>
        sum + DAY_COLS.reduce((s, col) => s + (r[col] ? (mealCostMap[r.meal_type + '|' + r[col]] || 0) : 0), 0), 0);

      data = { members, bills, dining, diningAnnual: diningAnnual, guaranteed, pensions, contributions, logs,
               purchases: purchases || [], crashes: crashes || [], savingsAccounts: savingsAccounts || [],
               contributionExceptions: contributionExceptions || [], workingTiers: workingTiers || [],
               incomeSources: incomeSources || [], incomeAmounts: incomeAmounts || [] };

      const sortedM = (members || []).slice().sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
      p1Name = sortedM[0] ? sortedM[0].name : 'Graham';
      p2Name = sortedM[1] ? sortedM[1].name : null;

      const pRows = await App.rest('op_modelling_parameters?member_name=eq.' + encodeURIComponent(p1Name) + '&order=updated_at.desc&limit=1');
      const p = (pRows && pRows.length) ? pRows[0] : {};
      let p2row = null, p2phase = null;
      if (p2Name) {
        const p2Rows = await App.rest('op_modelling_parameters?member_name=eq.' + encodeURIComponent(p2Name) + '&order=updated_at.desc&limit=1');
        p2row = (p2Rows && p2Rows.length) ? p2Rows[0] : null;
        if (p2row) p2phase = {
          phase1Date: App.parseLocalDate(p2row.shorter_week_date_1), phase1Days: p2row.working_days_1 ? Number(p2row.working_days_1) : 5,
          phase2Date: App.parseLocalDate(p2row.shorter_week_date_2), phase2Days: p2row.working_days_2 ? Number(p2row.working_days_2) : 5
        };
      }
      // household planned retirement = later of the two saved dates
      const r1 = App.parseLocalDate(p.retirement_date);
      const r2 = (p2row && p2row.retirement_date) ? App.parseLocalDate(p2row.retirement_date) : null;
      const planRetire = (r1 && r2) ? (r1 > r2 ? r1 : r2) : (r1 || r2);
      savedBase = {
        growthRate: p.pension_growth_rate != null ? Number(p.pension_growth_rate) : 0.05,
        gRatio: p.drawdown_ratio_graham != null ? Number(p.drawdown_ratio_graham) : 0.5,
        savingsFundBills: p.savings_fund_bills != null ? !!p.savings_fund_bills : true,
        phase1Date: App.parseLocalDate(p.shorter_week_date_1), phase1Days: p.working_days_1 ? Number(p.working_days_1) : 5,
        phase2Date: App.parseLocalDate(p.shorter_week_date_2), phase2Days: p.working_days_2 ? Number(p.working_days_2) : 5,
        p2phase: p2phase, planRetire: planRetire,
        planSpend: p.spending_reduction_pct != null ? Number(p.spending_reduction_pct) : 1.0
      };

      computeFrontier();
      if (plan) {
        const st = document.getElementById('spendTest');
        st.value = Math.max(20, Math.min(200, plan.pct));
        document.getElementById('spendTestVal').textContent = st.value + '%';
      }
      buildSubline();
      draw();
      status.style.display = 'none';
    } catch (e) { status.className = 's-err'; status.textContent = 'Could not load: ' + e.message; }
  }

  let rt = null;
  window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(draw, 160); });
  if (mq.addEventListener) mq.addEventListener('change', () => setTimeout(draw, 60));
  document.getElementById('spendTest').addEventListener('input', placeOverlays);
  function nudgeSpend(d) {
    const st = document.getElementById('spendTest');
    st.value = Math.max(20, Math.min(200, Number(st.value) + d));
    placeOverlays();
  }
  document.getElementById('spDn').addEventListener('click', () => nudgeSpend(-1));
  document.getElementById('spUp').addEventListener('click', () => nudgeSpend(1));
  window.addEventListener('message', (ev) => { if (ev && ev.data === 'refresh-data') load(); });

  google.charts.load('current', { packages: ['corechart'] });
  google.charts.setOnLoadCallback(() => { chartsReady = true; draw(); });
  App.requireLogin(load, { title: 'Retire Frontier' });
</script>
</body>
</html>
